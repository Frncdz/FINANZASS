<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi Sistema Financiero</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2316212B'/><path d='M7 21.5l5.5-6 4 3.8L25 10.5' stroke='%2334C99A' stroke-width='2.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/><circle cx='25' cy='10.5' r='2.4' fill='%2334C99A'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#141D26; --ink-2:#1C2836; --ink-3:#26364A;
  --bg:#EFF2F5; --card:#FFFFFF; --line:#E1E6EB; --hair:#EDF0F3;
  --text:#1A242F; --muted:#6E7C8A; --muted-2:#93A1AE;
  --in:#0D7355; --in-bg:#E9F5F1;
  --out:#AB3529; --out-bg:#FBECEA;
  --accent:#0E6E63;
  --pur:#5B41A0; --pur-bg:#F0ECFA;
  --warn:#A76A10; --warn-bg:#FCF3E3;
  --sh:0 1px 2px rgba(16,26,36,.05), 0 4px 14px rgba(16,26,36,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:60px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px}
.n{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.2px}
.lab{font-size:10.5px;text-transform:uppercase;letter-spacing:.85px;font-weight:700;color:var(--muted)}

/* HEADER */
header{background:var(--ink);color:#fff;padding:16px 22px 0;position:sticky;top:0;z-index:40}
.hw{max-width:1080px;margin:0 auto}
.htop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.logo{font-family:'Space Grotesk';font-size:16px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
.logo i{width:9px;height:9px;border-radius:2px;background:#34C99A;display:block}
.logo span{color:#7E8FA0;font-weight:500;font-size:13px}
.tabs{display:flex;gap:1px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{padding:9px 14px;font-size:13px;font-weight:600;color:#8496A6;border-bottom:2px solid transparent;white-space:nowrap}
.tabs button:hover{color:#fff}
.tabs button.on{color:#fff;border-color:#34C99A}

main{max-width:1080px;margin:0 auto;padding:20px 22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--sh)}
.ch{padding:12px 16px;border-bottom:1px solid var(--hair);display:flex;justify-content:space-between;align-items:center;gap:10px}
.cb{padding:14px 16px}
.cb.flush{padding:6px 16px 10px}
.mb{margin-bottom:14px}
.grid{display:grid;gap:14px}

/* HERO */
.hero{background:linear-gradient(160deg,#1B2735 0%,#141D26 62%);border-radius:12px;color:#fff;margin-bottom:14px;overflow:hidden;border:1px solid #223040}
.hero-top{padding:20px 22px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
.hero .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.9px;font-weight:700;color:#7E8FA0}
.hero .big{font-family:'Space Grotesk';font-size:40px;font-weight:700;letter-spacing:-1.5px;line-height:1.05;margin-top:5px}
.hero .sub{font-size:12px;color:#7E8FA0;margin-top:5px}
.mini{display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start}
.mini .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:#7E8FA0;font-weight:700}
.mini .v{font-family:'Space Grotesk';font-size:15.5px;font-weight:600;margin-top:3px}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:1px;background:#223040;border-top:1px solid #223040}
.hg{background:#18222E;padding:11px 14px 12px}
.hg .k{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:#7E8FA0;font-weight:700}
.hg .v{font-family:'Space Grotesk';font-size:17px;font-weight:600;margin-top:2px}
.hg .s{font-size:10.5px;color:#63768A;margin-top:1px}

/* TABLAS */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted-2);font-weight:700;text-align:left;padding:7px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--hair);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:#FAFBFC}
.tbl .r{text-align:right}
.tbl .c{text-align:center}
.dsc{font-weight:600;font-size:13.5px;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sm{font-size:12.5px;color:var(--muted)}
.mono{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--muted);white-space:nowrap}
.amt{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-weight:600;font-size:13.5px;white-space:nowrap}
.pos{color:var(--in)} .neg{color:var(--out)} .pur{color:var(--pur)}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.2px;text-transform:uppercase;vertical-align:1px;margin-left:6px}
.t-auto{background:var(--hair);color:var(--muted)}
.t-pago{background:var(--pur-bg);color:var(--pur)}
.acts{opacity:0;transition:.12s;white-space:nowrap}
tr:hover .acts{opacity:1}
@media(hover:none){.acts{opacity:1}}
.ib{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted-2);font-size:13px}
.ib:hover{background:var(--bg);color:var(--text)}

/* BOTONES */
.btn{padding:8px 14px;border-radius:8px;font-weight:600;font-size:13.5px;display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid transparent;transition:.12s}
.btn:active{transform:translateY(1px)}
.btn-in{background:var(--in);color:#fff;flex:1}
.btn-out{background:var(--out);color:#fff;flex:1}
.btn-dark{background:var(--ink);color:#fff}
.btn-dark:hover{background:var(--ink-3)}
.btn-line{background:#fff;border-color:var(--line);color:var(--text)}
.btn-line:hover{border-color:var(--ink-3)}
.btn-xs{padding:5px 10px;font-size:12.5px;border-radius:7px}
.quick{display:flex;gap:10px;margin-bottom:14px}

/* AVISOS COMPACTOS */
.alert{display:flex;align-items:center;gap:9px;padding:8px 10px;border-bottom:1px solid var(--hair)}
.alert:last-child{border-bottom:none}
.alert .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.alert .t{flex:1;min-width:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alert .w{font-size:11.5px;font-weight:600;white-space:nowrap}
.alert .a{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-weight:600;font-size:13.5px;white-space:nowrap}

/* MINI-TARJETAS (estilo tarjeta de crédito) */
.mc{background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--sh);overflow:hidden}
.mc .h{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.mc .h .nm{font-weight:700;font-size:13.5px;line-height:1.2}
.mc .h .bk{font-size:11px;opacity:.75;margin-top:1px}
.mc .b{padding:12px 14px}
.mc.wal .h{background:#F7F9FA;border-bottom:1px solid var(--hair)}
.mc.crd .h{background:linear-gradient(135deg,#2A2145,#493A78);color:#fff}
.mc.lon .h{background:#F7F9FA;border-bottom:1px solid var(--hair)}
.kv{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0}
.kv .k{font-size:12px;color:var(--muted)}
.kv .v{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-weight:600;font-size:13.5px}
.big-v{font-family:'Space Grotesk';font-size:22px;font-weight:600;letter-spacing:-.5px}
.foot{font-size:11px;color:var(--muted-2);margin-top:10px;padding-top:9px;border-top:1px solid var(--hair)}
.bar{height:5px;background:var(--hair);border-radius:20px;overflow:hidden;margin:8px 0 10px}
.bar i{display:block;height:100%;border-radius:20px}
.pill{border-radius:8px;padding:9px 11px;margin-bottom:10px}
.pill .k{font-size:10px;text-transform:uppercase;letter-spacing:.7px;font-weight:700;opacity:.85}
.pill .v{font-family:'Space Grotesk';font-size:19px;font-weight:600;margin-top:1px}
.pill .s{font-size:11.5px;margin-top:1px;opacity:.9}
.p-due{background:var(--out-bg);color:var(--out)}
.p-soon{background:var(--warn-bg);color:var(--warn)}
.p-ok{background:var(--in-bg);color:var(--in)}
.p-nu{background:#F7F9FA;color:var(--text)}

/* MES */
.mbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.mbar .nm{font-family:'Space Grotesk';font-size:17px;font-weight:600;text-transform:capitalize;min-width:150px}
.nv{width:32px;height:32px;border-radius:8px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:15px}
.nv:hover{border-color:var(--ink-3)}
.stats{display:flex;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-left:auto}
.stats div{background:#fff;padding:7px 14px}
.stats .k{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted-2);font-weight:700}
.stats .v{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-size:14.5px;font-weight:600;margin-top:1px}

/* FORM */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
label{font-size:12px;font-weight:600;color:var(--ink-3)}
input,select{padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);width:100%}
input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,110,99,.11)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg{display:flex;gap:8px;margin-bottom:14px}
.seg button{flex:1;padding:10px;border-radius:8px;font-weight:600;font-size:13.5px;border:1px solid var(--line);background:#fff;color:var(--muted)}
.seg button.on-in{background:var(--in-bg);border-color:var(--in);color:var(--in)}
.seg button.on-out{background:var(--out-bg);border-color:var(--out);color:var(--out)}

.overlay{position:fixed;inset:0;background:rgba(16,24,33,.55);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:440px;max-height:92vh;overflow-y:auto}
.mh{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff}
.mh h3{font-family:'Space Grotesk';font-size:15.5px;font-weight:600}
.mbd{padding:16px 18px}
.mf{padding:12px 18px 18px;display:flex;gap:9px}
.mf .btn{flex:1}
@media(min-width:640px){.overlay{align-items:center;padding:20px}.modal{border-radius:14px}}

.empty{text-align:center;padding:30px 18px;color:var(--muted)}
.empty .e{font-size:26px;opacity:.3;margin-bottom:8px}
.empty p{font-size:13px;margin-bottom:12px}
.hint{background:#F7F9FA;border-left:2px solid var(--accent);padding:8px 12px;border-radius:0 6px 6px 0;font-size:12px;color:var(--muted);line-height:1.5}
.toast{position:fixed;left:50%;bottom:20px;transform:translate(-50%,80px);background:var(--ink);color:#fff;padding:9px 18px;border-radius:9px;font-weight:600;font-size:13px;z-index:200;transition:.25s;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.toast.show{transform:translate(-50%,0)}
.kbd{font-size:10.5px;color:var(--muted-2);padding:2px 5px;border:1px solid var(--line);border-radius:4px;font-family:'Space Grotesk'}

@media(max-width:700px){
  .hero .big{font-size:32px}
  .hide-s{display:none}
  main{padding:14px}
  header{padding:14px 14px 0}
  .stats{margin-left:0;width:100%}
  .stats div{flex:1}
  .mbar{flex-wrap:wrap}
}
</style>
</head>
<body>

<header>
  <div class="hw">
    <div class="htop">
      <div class="logo"><i></i>Mi Dinero <span>· control simple</span></div>
      <button class="ib" style="color:#8496A6" onclick="menuDatos()">⋯</button>
    </div>
    <nav class="tabs" id="tabs">
      <button data-v="inicio" class="on">Inicio</button>
      <button data-v="historial">Historial</button>
      <button data-v="tarjetas">Tarjetas</button>
      <button data-v="prestamos">Préstamos</button>
      <button data-v="recurrentes">Recurrentes</button>
      <button data-v="billeteras">Billeteras</button>
    </nav>
  </div>
</header>

<main id="app"></main>
<div id="modal"></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════ ALMACENAMIENTO ═══════════ */
const KEY='mi_dinero_v2';
let memoria=null;
const store={
  get(){ try{ return localStorage.getItem(KEY); }catch(e){ return memoria; } },
  set(v){ try{ localStorage.setItem(KEY,v); }catch(e){ memoria=v; } }
};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const hoy=()=>new Date().toISOString().slice(0,10);
const iso=d=>d.toISOString().slice(0,10);
const D=f=>new Date(f+'T12:00:00');
function sumarDias(f,n){const d=D(f);d.setDate(d.getDate()+n);return iso(d);}
function conDia(anio,mes,dia){
  const ultimo=new Date(anio,mes+1,0).getDate();
  return iso(new Date(anio,mes,Math.min(dia,ultimo),12));
}
function ultimoDia(dia,ref){
  ref=ref||hoy(); const r=D(ref);
  let f=conDia(r.getFullYear(),r.getMonth(),dia);
  if(f>ref) f=conDia(r.getFullYear(),r.getMonth()-1,dia);
  return f;
}
function proximoDia(dia,ref){
  ref=ref||hoy(); const r=D(ref);
  let f=conDia(r.getFullYear(),r.getMonth(),dia);
  if(f<ref) f=conDia(r.getFullYear(),r.getMonth()+1,dia);
  return f;
}
const diasHasta=f=>Math.round((D(f)-D(hoy()))/86400000);

/* ═══════════ DATOS ═══════════ */
const INICIAL={
  billeteras:[
    {id:'w1',nombre:'Efectivo',icono:'💵',saldoInicial:300},
    {id:'w2',nombre:'Yape',icono:'📱',saldoInicial:450},
    {id:'w3',nombre:'Plin',icono:'💬',saldoInicial:120},
    {id:'w4',nombre:'Cuenta de ahorros',icono:'🏦',saldoInicial:2500},
  ],
  tarjetas:[
    {id:'t1',nombre:'Visa Clásica',banco:'BCP',linea:6000,diaCierre:25,diaPago:15},
    {id:'t2',nombre:'Mastercard',banco:'Interbank',linea:4500,diaCierre:5,diaPago:20},
  ],
  prestamos:[
    {id:'p1',nombre:'Crédito vehicular',entidad:'BBVA',cuota:963.79,cuotas:36,pagadas:10,
     diaPago:10,proxima:proximoDia(10),billeteraId:'w4',activo:true},
  ],
  movimientos:[
    {id:uid(),fecha:hoy(),tipo:'Ingreso',monto:2800,descripcion:'Sueldo',categoria:'Sueldo',medioId:'w4'},
    {id:uid(),fecha:hoy(),tipo:'Egreso',monto:65,descripcion:'Almuerzo',categoria:'Comida',medioId:'w2'},
    {id:uid(),fecha:sumarDias(hoy(),-45),tipo:'Egreso',monto:750,descripcion:'Televisor',categoria:'Compras',medioId:'t1'},
    {id:uid(),fecha:sumarDias(hoy(),-20),tipo:'Egreso',monto:420,descripcion:'Zapatillas',categoria:'Compras',medioId:'t1'},
    {id:uid(),fecha:sumarDias(hoy(),-2),tipo:'Egreso',monto:180,descripcion:'Supermercado',categoria:'Comida',medioId:'t1'},
    {id:uid(),fecha:hoy(),tipo:'Egreso',monto:120,descripcion:'Recibo de luz',categoria:'Servicios',medioId:'w4'},
  ],
  recurrentes:[
    {id:uid(),concepto:'Sueldo',tipo:'Ingreso',monto:2800,categoria:'Sueldo',medioId:'w4',frecuencia:'Mensual',proxima:sumarDias(hoy(),30),activo:true},
    {id:uid(),concepto:'Internet',tipo:'Egreso',monto:99,categoria:'Servicios',medioId:'w4',frecuencia:'Mensual',proxima:sumarDias(hoy(),6),activo:true},
  ],
};

let DB;
function cargar(){
  const raw=store.get();
  try{ DB = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(INICIAL)); }
  catch(e){ DB = JSON.parse(JSON.stringify(INICIAL)); }
  DB.billeteras ||= []; DB.movimientos ||= []; DB.recurrentes ||= [];
  DB.tarjetas ||= []; DB.prestamos ||= [];
}
function guardar(){ store.set(JSON.stringify(DB)); }

/* ═══════════ FORMATO ═══════════ */
const S=n=>'S/ '+(+n||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const S0=n=>'S/ '+Math.round(+n||0).toLocaleString('es-PE');
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const mesDe=f=>(f||'').slice(0,7);
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const nombreMes=ym=>{const[a,m]=ym.split('-');return MESES[+m-1]+' '+a;};
const fechaCorta=f=>{const[a,m,d]=f.split('-');return `${d} ${MESES[+m-1].slice(0,3)}`;};
const mesActual=()=>hoy().slice(0,7);

/* ═══════════ SALDOS Y DEUDAS ═══════════ */
const billetera=id=>DB.billeteras.find(b=>b.id===id);
const tarjeta=id=>DB.tarjetas.find(t=>t.id===id);
const medioNombre=id=>{const b=billetera(id);if(b)return b.nombre;const t=tarjeta(id);return t?t.nombre:'—';};
const medioIcono=id=>{const b=billetera(id);if(b)return b.icono||'💼';return tarjeta(id)?'💳':'';};

function saldo(id){
  const b=billetera(id); if(!b) return 0;
  return DB.movimientos.reduce((t,m)=>{
    if(m.medioId!==id) return t;
    if(m.tipo==='Ingreso') return t + +m.monto;
    return t - +m.monto;
  }, +b.saldoInicial||0);
}
const dineroPropio=()=>DB.billeteras.reduce((t,b)=>t+saldo(b.id),0);

function estadoTarjeta(t){
  const consumos=DB.movimientos.filter(m=>m.tipo==='Egreso'&&m.medioId===t.id);
  const pagos=DB.movimientos.filter(m=>m.tipo==='Pago'&&m.tarjetaId===t.id);
  const totalConsumo=consumos.reduce((a,m)=>a + +m.monto,0);
  const totalPagado=pagos.reduce((a,m)=>a + +m.monto,0);
  const deuda=Math.max(0,totalConsumo-totalPagado);
  const cierreUlt=ultimoDia(t.diaCierre);
  const cierreProx=proximoDia(t.diaCierre,sumarDias(hoy(),1));
  const sinFacturar=consumos.filter(m=>m.fecha>cierreUlt).reduce((a,m)=>a + +m.monto,0);
  const porPagar=Math.max(0,deuda-sinFacturar);
  const vence=proximoDia(t.diaPago);
  const dias=diasHasta(vence);
  const disponible=Math.max(0,(+t.linea||0)-deuda);
  const uso=t.linea? deuda/t.linea : 0;
  return {deuda,porPagar,sinFacturar,disponible,uso,cierreUlt,cierreProx,vence,dias};
}
const deudaTarjetas=()=>DB.tarjetas.reduce((a,t)=>a+estadoTarjeta(t).deuda,0);
const creditoDisponible=()=>DB.tarjetas.reduce((a,t)=>a+estadoTarjeta(t).disponible,0);

function estadoPrestamo(p){
  const restantes=Math.max(0,(+p.cuotas||0)-(+p.pagadas||0));
  const pendiente=restantes*(+p.cuota||0);
  const avance=p.cuotas? (+p.pagadas||0)/p.cuotas : 0;
  return {restantes,pendiente,avance,dias:diasHasta(p.proxima),terminado:restantes===0};
}
const deudaPrestamos=()=>DB.prestamos.reduce((a,p)=>a+estadoPrestamo(p).pendiente,0);
const deudaTotal=()=>deudaTarjetas()+deudaPrestamos();

function totalesMes(ym){
  let ing=0,egr=0,pag=0;
  for(const m of DB.movimientos){
    if(mesDe(m.fecha)!==ym) continue;
    if(m.tipo==='Ingreso') ing+=+m.monto;
    else if(m.tipo==='Pago') pag+=+m.monto;
    else egr+=+m.monto;
  }
  return {ing,egr,pag,neto:ing-egr};
}

/* ═══════════ RECORDATORIOS ═══════════ */
function recordatorios(){
  const l=[];
  for(const t of DB.tarjetas){
    const e=estadoTarjeta(t);
    if(e.porPagar>0.01)
      l.push({tipo:'tarjeta',id:t.id,titulo:t.nombre,monto:e.porPagar,fecha:e.vence,dias:e.dias});
  }
  for(const p of DB.prestamos){
    const e=estadoPrestamo(p);
    if(!p.activo||e.terminado) continue;
    l.push({tipo:'prestamo',id:p.id,titulo:p.nombre,monto:+p.cuota,fecha:p.proxima,dias:e.dias});
  }
  return l.sort((a,b)=>a.fecha.localeCompare(b.fecha));
}
const urgencia=d=> d<=3?'due' : d<=7?'soon' : 'ok';
const colorU={due:'var(--out)',soon:'var(--warn)',ok:'var(--in)'};
function textoDias(d){
  if(d<0) return `venció hace ${-d}d`;
  if(d===0) return 'vence hoy';
  if(d===1) return 'mañana';
  return `en ${d} días`;
}

/* ═══════════ RECURRENTES ═══════════ */
const PASOS={Semanal:{d:7},Quincenal:{d:15},Mensual:{m:1},Bimestral:{m:2},Trimestral:{m:3},Semestral:{m:6},Anual:{m:12}};
function siguienteFecha(f,frec){
  const p=PASOS[frec]||PASOS.Mensual;
  const d=D(f);
  if(p.d){ d.setDate(d.getDate()+p.d); return iso(d); }
  return conDia(d.getFullYear(), d.getMonth()+p.m, d.getDate());
}
function crearDesde(r,fecha){
  DB.movimientos.push({id:uid(),fecha,tipo:r.tipo,monto:+r.monto,descripcion:r.concepto,
    categoria:r.categoria,medioId:r.medioId,recurrenteId:r.id});
}
function generarVencidos(){
  let n=0; const limite=hoy();
  for(const r of DB.recurrentes){
    if(!r.activo||!r.proxima) continue;
    let g=0;
    while(r.proxima<=limite && g++<200){
      crearDesde(r,r.proxima);
      r.proxima=siguienteFecha(r.proxima,r.frecuencia); n++;
    }
  }
  if(n) guardar();
  return n;
}
function generarVeces(id,veces){
  const r=DB.recurrentes.find(x=>x.id===id);
  veces=Math.max(1,Math.min(60,+veces||1));
  for(let i=0;i<veces;i++){ crearDesde(r,r.proxima); r.proxima=siguienteFecha(r.proxima,r.frecuencia); }
  pintar(); aviso(`${veces} ${veces===1?'movimiento generado':'movimientos generados'}`);
}

            <td class="r sm hide-s">${DB.movimientos.filter(m=>m.medioId===b.id).length}</td>
            <td class="r amt ${s<0?'neg':''}">${S(s)}</td>
            <td class="r"><span class="acts">
              <button class="ib" onclick="formBilletera('${b.id}')">✎</button>
              <button class="ib" onclick="borrarBilletera('${b.id}')">✕</button></span></td>
          </tr>`;}).join('')}
        </tbody>
        <tfoot><tr>
          <td style="font-weight:700;font-size:13px">Total</td>
          <td class="hide-s"></td><td class="hide-s"></td>
          <td class="r amt" style="font-size:14.5px">${S(dineroPropio())}</td><td></td>
        </tr></tfoot>
      </table></div>
    </div>`;
}
function borrarBilletera(id){
  const n=DB.movimientos.filter(m=>m.medioId===id).length;
  if(!confirm(n?`Esta billetera tiene ${n} movimientos. Se eliminarán también. ¿Continuar?`:'¿Eliminar esta billetera?')) return;
  DB.movimientos=DB.movimientos.filter(m=>m.medioId!==id);
  DB.recurrentes=DB.recurrentes.filter(r=>r.medioId!==id);
  DB.billeteras=DB.billeteras.filter(b=>b.id!==id);
  pintar(); aviso('Billetera eliminada');
}

/* ═══════════ FORMULARIOS ═══════════ */
let tipoSel='Egreso';
const CATEGORIAS=['Sueldo','Negocio','Venta','Comida','Transporte','Servicios','Vivienda','Salud','Educación','Compras','Ocio','Préstamo','Otros'];

function opcionesMedio(sel,soloBilleteras){
  let h=`<optgroup label="Billeteras">${DB.billeteras.map(b=>
    `<option value="${b.id}" ${sel===b.id?'selected':''}>${b.icono} ${esc(b.nombre)}</option>`).join('')}</optgroup>`;
  if(!soloBilleteras && DB.tarjetas.length)
    h+=`<optgroup label="Tarjetas de crédito">${DB.tarjetas.map(t=>
      `<option value="${t.id}" ${sel===t.id?'selected':''}>💳 ${esc(t.nombre)}</option>`).join('')}</optgroup>`;
  return h;
}

function formMov(id,tipo,medio){
  const m=id?DB.movimientos.find(x=>x.id===id):null;
  tipoSel=m?m.tipo:(tipo||'Egreso');
  if(!DB.billeteras.length){ aviso('Primero crea una billetera'); return formBilletera(); }
  abrir(id?'Editar movimiento':'Nuevo movimiento',`
    <div class="seg">
      <button id="sIng" onclick="setTipo('Ingreso')">Ingreso</button>
      <button id="sEgr" onclick="setTipo('Egreso')">Egreso</button>
    </div>
    <div class="field"><label>¿Cuánto?</label>
      <input id="f_monto" type="number" step="0.01" inputmode="decimal" value="${m?m.monto:''}" placeholder="0.00"></div>
    <div class="field"><label id="labMedio">¿Con qué pagaste?</label>
      <select id="f_medio">${opcionesMedio(m?m.medioId:medio, tipoSel==='Ingreso')}</select>
      <div id="avisoTarjeta" style="display:none;font-size:12px;color:var(--pur);background:var(--pur-bg);padding:8px 10px;border-radius:7px">
        Al pagar con tarjeta no sale dinero de tus billeteras: sube tu deuda y la pagas en la fecha de pago.</div>
    </div>
    <div class="field"><label>¿Qué fue?</label>
      <input id="f_desc" value="${m?esc(m.descripcion):''}" placeholder="Ej. Almuerzo, recibo de luz"></div>
    <div class="two">
      <div class="field"><label>Categoría</label>
        <input id="f_cat" list="cats" value="${m?esc(m.categoria):''}" placeholder="Comida">
        <datalist id="cats">${CATEGORIAS.map(c=>`<option value="${c}">`).join('')}</datalist></div>
      <div class="field"><label>Fecha</label>
        <input id="f_fecha" type="date" value="${m?m.fecha:hoy()}"></div>
    </div>`,
    ()=>{
      const monto=+val('f_monto');
      if(!monto||monto<=0){ aviso('Escribe un monto'); return false; }
      const d={fecha:val('f_fecha')||hoy(),tipo:tipoSel,monto,descripcion:val('f_desc'),
               categoria:val('f_cat'),medioId:val('f_medio')};
      if(id) Object.assign(DB.movimientos.find(x=>x.id===id),d);
      else DB.movimientos.push({id:uid(),...d});
      pintar(); aviso(id?'Movimiento actualizado':(tipoSel==='Ingreso'?'Ingreso registrado':'Egreso registrado'));
      return true;
    });
  setTipo(tipoSel);
}
function setTipo(t){
  tipoSel=t;
  const i=document.getElementById('sIng'), e=document.getElementById('sEgr');
  if(!i) return;
  i.className=t==='Ingreso'?'on-in':''; e.className=t==='Egreso'?'on-out':'';
  const sel=document.getElementById('f_medio'), lab=document.getElementById('labMedio');
  if(sel){
    const actual=sel.value;
    lab.textContent = t==='Ingreso'?'¿A dónde entró?':'¿Con qué pagaste?';
    sel.innerHTML=opcionesMedio(actual, t==='Ingreso');
    sel.onchange=revisarTarjeta;
    revisarTarjeta();
  }
}
function revisarTarjeta(){
  const sel=document.getElementById('f_medio'), av=document.getElementById('avisoTarjeta');
  if(!sel||!av) return;
  av.style.display = tarjeta(sel.value) ? 'block' : 'none';
}
function borrarMov(id){
  if(!confirm('¿Eliminar este movimiento?')) return;
  const m=DB.movimientos.find(x=>x.id===id);
  if(m&&m.prestamoId){
    const p=DB.prestamos.find(x=>x.id===m.prestamoId);
    if(p&&p.pagadas>0){
      p.pagadas--;
      p.proxima=conDia(D(p.proxima).getFullYear(),D(p.proxima).getMonth()-1,p.diaPago);
    }
  }
  DB.movimientos=DB.movimientos.filter(x=>x.id!==id); pintar(); aviso('Movimiento eliminado');
}

function formBilletera(id){
  const b=id?DB.billeteras.find(x=>x.id===id):null;
  const iconos=['💵','📱','💬','🏦','💳','🐷','👛','💰','🏧','📦'];
  abrir(id?'Editar billetera':'Nueva billetera',`
    <div class="field"><label>Nombre</label>
      <input id="b_nom" value="${b?esc(b.nombre):''}" placeholder="Ej. Yape, Efectivo, BCP"></div>
    <div class="field"><label>Ícono</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="iconos">
        ${iconos.map(i=>`<button type="button" onclick="pickIcono('${i}')" data-i="${i}"
          style="width:38px;height:38px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:17px">${i}</button>`).join('')}
      </div><input type="hidden" id="b_ico" value="${b?b.icono:'💼'}"></div>
    <div class="field"><label>Saldo inicial <span style="color:var(--muted);font-weight:400">— lo que ya tienes ahí</span></label>
      <input id="b_saldo" type="number" step="0.01" inputmode="decimal" value="${b?b.saldoInicial:0}"></div>`,
    ()=>{
      const nom=val('b_nom').trim();
      if(!nom){ aviso('Ponle un nombre'); return false; }
      const d={nombre:nom,icono:val('b_ico')||'💼',saldoInicial:+val('b_saldo')||0};
      if(id) Object.assign(DB.billeteras.find(x=>x.id===id),d);
      else DB.billeteras.push({id:uid(),...d});
      pintar(); aviso(id?'Billetera actualizada':'Billetera creada'); return true;
    });
  pickIcono(b?b.icono:'💼');
}
function pickIcono(i){
  const h=document.getElementById('b_ico'); if(!h) return;
  h.value=i;
  document.querySelectorAll('#iconos button').forEach(b=>{
    const on=b.dataset.i===i;
    b.style.borderColor=on?'var(--accent)':'var(--line)';
    b.style.background=on?'#E9F2F1':'#fff';
  });
}

function formTarjeta(id){
  const t=id?tarjeta(id):null;
  abrir(id?'Editar tarjeta':'Nueva tarjeta',`
    <div class="field"><label>Nombre de la tarjeta</label>
      <input id="t_nom" value="${t?esc(t.nombre):''}" placeholder="Ej. Visa Clásica"></div>
    <div class="field"><label>Banco</label>
      <input id="t_ban" value="${t?esc(t.banco||''):''}" placeholder="Ej. BCP, Interbank"></div>
    <div class="field"><label>Línea de crédito</label>
      <input id="t_lin" type="number" step="0.01" inputmode="decimal" value="${t?t.linea:''}" placeholder="6000"></div>
    <div class="two">
      <div class="field"><label>Día de cierre</label>
        <input id="t_cie" type="number" min="1" max="31" value="${t?t.diaCierre:25}"></div>
      <div class="field"><label>Día de pago</label>
        <input id="t_pag" type="number" min="1" max="31" value="${t?t.diaPago:15}"></div>
    </div>
    <div class="hint">Ambos días vienen en tu estado de cuenta.</div>`,
    ()=>{
      const nom=val('t_nom').trim();
      if(!nom){ aviso('Ponle un nombre'); return false; }
      const lin=+val('t_lin');
      if(!lin||lin<=0){ aviso('Escribe la línea de crédito'); return false; }
      const d={nombre:nom,banco:val('t_ban'),linea:lin,
               diaCierre:Math.min(31,Math.max(1,+val('t_cie')||25)),
               diaPago:Math.min(31,Math.max(1,+val('t_pag')||15))};
      if(id) Object.assign(tarjeta(id),d);
      else DB.tarjetas.push({id:uid(),...d});
      pintar(); aviso(id?'Tarjeta actualizada':'Tarjeta creada'); return true;
    });
}

function formPagoTarjeta(id){
  const t=tarjeta(id), e=estadoTarjeta(t);
  if(!DB.billeteras.length){ aviso('Necesitas una billetera'); return; }
  abrir('Pagar '+t.nombre,`
    <div class="pill p-nu" style="margin-bottom:14px">
      <div class="k">Facturado por pagar</div><div class="v">${S(e.porPagar)}</div>
      <div class="s" style="color:var(--muted)">Vence el ${fechaCorta(e.vence)}${e.sinFacturar>0?` · aparte llevas ${S(e.sinFacturar)} de este ciclo`:''}</div>
    </div>
    <div class="field"><label>¿Cuánto vas a pagar?</label>
      <input id="p_monto" type="number" step="0.01" inputmode="decimal" value="${e.porPagar.toFixed(2)}"></div>
    <div class="field"><label>¿Desde qué billetera?</label>
      <select id="p_bill">${DB.billeteras.map(b=>`<option value="${b.id}">${b.icono} ${esc(b.nombre)} — ${S(saldo(b.id))}</option>`).join('')}</select></div>
    <div class="field"><label>Fecha</label><input id="p_fecha" type="date" value="${hoy()}"></div>
    <div class="hint">Se descuenta de tu billetera y baja tu deuda. No cuenta como gasto nuevo.</div>`,
    ()=>{
      const monto=+val('p_monto');
      if(!monto||monto<=0){ aviso('Escribe un monto'); return false; }
      DB.movimientos.push({id:uid(),fecha:val('p_fecha')||hoy(),tipo:'Pago',monto,
        descripcion:'Pago '+t.nombre,categoria:'Tarjeta',medioId:val('p_bill'),tarjetaId:t.id});
      pintar(); aviso('Pago registrado'); return true;
    });
}

function formPrestamo(id){
  const p=id?DB.prestamos.find(x=>x.id===id):null;
  if(!DB.billeteras.length){ aviso('Primero crea una billetera'); return formBilletera(); }
  abrir(id?'Editar préstamo':'Nuevo préstamo',`
    <div class="field"><label>Nombre</label>
      <input id="l_nom" value="${p?esc(p.nombre):''}" placeholder="Ej. Crédito vehicular"></div>
    <div class="field"><label>Entidad</label>
      <input id="l_ent" value="${p?esc(p.entidad||''):''}" placeholder="Ej. BBVA"></div>
    <div class="field"><label>Cuota mensual</label>
      <input id="l_cuo" type="number" step="0.01" inputmode="decimal" value="${p?p.cuota:''}" placeholder="500.00"></div>
    <div class="two">
      <div class="field"><label>Total de cuotas</label>
        <input id="l_tot" type="number" min="1" value="${p?p.cuotas:12}"></div>
      <div class="field"><label>Ya pagadas</label>
        <input id="l_pag" type="number" min="0" value="${p?p.pagadas:0}"></div>
    </div>
    <div class="two">
      <div class="field"><label>Día de pago</label>
        <input id="l_dia" type="number" min="1" max="31" value="${p?p.diaPago:10}"></div>
      <div class="field"><label>Próxima cuota</label>
        <input id="l_prox" type="date" value="${p?p.proxima:proximoDia(10)}"></div>
    </div>
    <div class="field"><label>Se paga desde</label>
      <select id="l_bill">${DB.billeteras.map(b=>`<option value="${b.id}" ${p&&p.billeteraId===b.id?'selected':''}>${b.icono} ${esc(b.nombre)}</option>`).join('')}</select></div>`,
    ()=>{
      const nom=val('l_nom').trim(), cuo=+val('l_cuo');
      if(!nom){ aviso('Ponle un nombre'); return false; }
      if(!cuo||cuo<=0){ aviso('Escribe la cuota mensual'); return false; }
      const dia=Math.min(31,Math.max(1,+val('l_dia')||10));
      const d={nombre:nom,entidad:val('l_ent'),cuota:cuo,
               cuotas:Math.max(1,+val('l_tot')||1),pagadas:Math.max(0,+val('l_pag')||0),
               diaPago:dia,proxima:val('l_prox')||proximoDia(dia),
               billeteraId:val('l_bill'),activo:true};
      if(id) Object.assign(DB.prestamos.find(x=>x.id===id),d);
      else DB.prestamos.push({id:uid(),...d});
      pintar(); aviso(id?'Préstamo actualizado':'Préstamo creado'); return true;
    });
}

function formPagoCuota(id){
  const p=DB.prestamos.find(x=>x.id===id);
  abrir('Pagar cuota',`
    <div class="pill p-nu" style="margin-bottom:14px">
      <div class="k">Cuota ${(+p.pagadas||0)+1} de ${p.cuotas}</div><div class="v">${S(p.cuota)}</div>
      <div class="s" style="color:var(--muted)">${esc(p.nombre)} · vence ${fechaCorta(p.proxima)}</div>
    </div>
    <div class="field"><label>Monto</label>
      <input id="c_monto" type="number" step="0.01" inputmode="decimal" value="${(+p.cuota).toFixed(2)}"></div>
    <div class="field"><label>¿Desde qué billetera?</label>
      <select id="c_bill">${DB.billeteras.map(b=>`<option value="${b.id}" ${p.billeteraId===b.id?'selected':''}>${b.icono} ${esc(b.nombre)} — ${S(saldo(b.id))}</option>`).join('')}</select></div>
    <div class="field"><label>Fecha</label><input id="c_fecha" type="date" value="${hoy()}"></div>`,
    ()=>{
      const monto=+val('c_monto');
      if(!monto||monto<=0){ aviso('Escribe un monto'); return false; }
      DB.movimientos.push({id:uid(),fecha:val('c_fecha')||hoy(),tipo:'Egreso',monto,
        descripcion:'Cuota '+p.nombre,categoria:'Préstamo',medioId:val('c_bill'),prestamoId:p.id});
      p.pagadas=Math.min(p.cuotas,(+p.pagadas||0)+1);
      p.proxima=conDia(D(p.proxima).getFullYear(), D(p.proxima).getMonth()+1, p.diaPago);
      pintar(); aviso(p.pagadas>=p.cuotas?'Préstamo terminado':'Cuota registrada'); return true;
    });
}

function formRecurrente(id){
  const r=id?DB.recurrentes.find(x=>x.id===id):null;
  if(!DB.billeteras.length){ aviso('Primero crea una billetera'); return formBilletera(); }

    <div class="field"><label>¿Qué es?</label>
      <input id="r_con" value="${r?esc(r.concepto):''}" placeholder="Ej. Sueldo, alquiler, Netflix"></div>
    <div class="two">
      <div class="field"><label>Tipo</label>
        <select id="r_tipo"><option ${r&&r.tipo==='Ingreso'?'selected':''}>Ingreso</option><option ${!r||r.tipo==='Egreso'?'selected':''}>Egreso</option></select></div>
      <div class="field"><label>Monto</label>
        <input id="r_monto" type="number" step="0.01" inputmode="decimal" value="${r?r.monto:''}" placeholder="0.00"></div>
    </div>
    <div class="field"><label>Billetera o tarjeta</label>
      <select id="r_medio">${opcionesMedio(r?r.medioId:null,false)}</select></div>
    <div class="two">
      <div class="field"><label>¿Cada cuánto?</label>
        <select id="r_frec">${Object.keys(PASOS).map(f=>`<option ${r&&r.frecuencia===f?'selected':(!r&&f==='Mensual'?'selected':'')}>${f}</option>`).join('')}</select></div>
      <div class="field"><label>Próxima fecha</label>
        <input id="r_prox" type="date" value="${r?r.proxima:hoy()}"></div>
    </div>
    <div class="field"><label>Categoría</label>
      <input id="r_cat" list="cats2" value="${r?esc(r.categoria):''}" placeholder="Servicios">
      <datalist id="cats2">${CATEGORIAS.map(c=>`<option value="${c}">`).join('')}</datalist></div>`,
    ()=>{
      const con=val('r_con').trim(), monto=+val('r_monto');
      if(!con){ aviso('Ponle un nombre'); return false; }
      if(!monto||monto<=0){ aviso('Escribe un monto'); return false; }
      const d={concepto:con,tipo:val('r_tipo'),monto,categoria:val('r_cat'),medioId:val('r_medio'),
               frecuencia:val('r_frec'),proxima:val('r_prox')||hoy(),activo:r?r.activo:true};
      if(id) Object.assign(DB.recurrentes.find(x=>x.id===id),d);
      else DB.recurrentes.push({id:uid(),...d});
      pintar(); aviso(id?'Recurrente actualizado':'Recurrente creado'); return true;
    });
}

/* ═══════════ UI ═══════════ */
const val=id=>{const e=document.getElementById(id);return e?e.value:'';};
let alGuardar=null;
function abrir(titulo,cuerpo,onSave){
  alGuardar=onSave;
  document.getElementById('modal').innerHTML=`
    <div class="overlay" onclick="if(event.target===this)cerrar()">
      <div class="modal">
        <div class="mh"><h3>${titulo}</h3><button class="ib" onclick="cerrar()">✕</button></div>
        <div class="mbd">${cuerpo}</div>
        <div class="mf">
          <button class="btn btn-line" onclick="cerrar()">Cancelar</button>
          <button class="btn btn-dark" onclick="confirmar()">Guardar <span class="kbd" style="color:#8496A6;border-color:#3A4A5C">⏎</span></button>
        </div>
      </div>
    </div>`;
  setTimeout(()=>{const i=document.querySelector('.mbd input');if(i){i.focus();i.select&&i.select();}},60);
}
function cerrar(){ document.getElementById('modal').innerHTML=''; alGuardar=null; }
function confirmar(){ if(!alGuardar) return cerrar(); if(alGuardar()!==false) cerrar(); }

/* Enter guarda · Escape cierra */
document.addEventListener('keydown',e=>{
  if(!alGuardar) return;
  if(e.key==='Enter'){
    const t=e.target;
    if(t && (t.tagName==='TEXTAREA' || t.type==='button' || t.tagName==='BUTTON')) return;
    e.preventDefault(); confirmar();
  }
  if(e.key==='Escape'){ e.preventDefault(); cerrar(); }
});

let tT;
function aviso(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2200);
}
function menuDatos(){
  abrir('Mis datos',`
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">
      Todo se guarda en este navegador, en tu equipo. Nadie más lo ve.</p>
    <button class="btn btn-line" style="width:100%;margin-bottom:9px" onclick="exportar()">Descargar copia (CSV)</button>
    <button class="btn btn-line" style="width:100%;color:var(--out)" onclick="reiniciar()">Borrar todo y empezar de cero</button>`,
    ()=>true);
}
function exportar(){
  const filas=[['Fecha','Tipo','Descripcion','Categoria','Medio','Monto']];
  DB.movimientos.slice().sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(m=>{
    filas.push([m.fecha,m.tipo,m.descripcion||'',m.categoria||'',medioNombre(m.medioId),(+m.monto).toFixed(2)]);
  });
  const csv=filas.map(f=>f.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='mis-movimientos.csv'; a.click();
  cerrar(); aviso('Copia descargada');
}
function reiniciar(){
  if(!confirm('Se borrará todo: billeteras, tarjetas, préstamos y movimientos. ¿Seguro?')) return;
  DB=JSON.parse(JSON.stringify(INICIAL)); cerrar(); pintar(); aviso('Todo reiniciado');
}

/* ═══════════ ARRANQUE ═══════════ */
cargar();
const generados=generarVencidos();
pintar();
if(generados) setTimeout(()=>aviso(`${generados} movimiento${generados===1?'':'s'} recurrente${generados===1?'':'s'} registrado${generados===1?'':'s'}`),600);
</script>
