<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141513">
<title>Mi Dinero</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23141513'/><g fill='%23FFFFFF'><rect x='7' y='17' width='4' height='8' rx='1'/><rect x='14' y='12' width='4' height='13' rx='1'/><rect x='21' y='7' width='4' height='18' rx='1' fill='%232F8F6B'/></g></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --page:#F2F2F0; --paper:#FFFFFF; --raise:#FAFAF9; --sunk:#F5F5F3;
  --line:#E4E3DF; --hair:#EDECE8;
  --ink:#141513; --ink-soft:#3A3B37;
  --text:#1E1F1C; --muted:#75766E; --faint:#9B9C93;
  --pos:#1F6B4F; --pos-bg:#E8F2EC;
  --neg:#9E3B2C; --neg-bg:#F8ECE9;
  --warn:#8A6414; --warn-bg:#F6F0E1;
  --info:#3C5A73; --info-bg:#EBF0F4;
  --sh:0 1px 1px rgba(20,21,19,.03), 0 2px 8px rgba(20,21,19,.04);
  --sh2:0 1px 2px rgba(20,21,19,.05), 0 12px 28px rgba(20,21,19,.07);
  --r:12px;
}
html[data-theme="dark"]{
  --page:#0D0E0C; --paper:#171917; --raise:#1D1F1C; --sunk:#212420;
  --line:#2A2D28; --hair:#242721;
  --ink:#F2F2EF; --ink-soft:#C9CAC4;
  --text:#E8E9E4; --muted:#8E9088; --faint:#6B6D65;
  --pos:#4FB489; --pos-bg:#14261E;
  --neg:#D9705C; --neg-bg:#2A1713;
  --warn:#C79B3C; --warn-bg:#241E10;
  --info:#7FA3C0; --info-bg:#141C24;
  --sh:0 1px 2px rgba(0,0,0,.4); --sh2:0 12px 30px rgba(0,0,0,.45);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--page);color:var(--text);
  font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;font-feature-settings:"cv05","ss01"}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px;color:var(--text)}
svg.ic{display:block;flex-shrink:0}
.num{font-family:'Archivo',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.2px}
.mut{color:var(--muted)}
.lab{font-size:10px;text-transform:uppercase;letter-spacing:1.1px;font-weight:600;color:var(--faint)}

/* ══ LAYOUT ══ */
.layout{display:flex;min-height:100vh}
.side{width:216px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.logo{display:flex;align-items:center;gap:10px;padding:20px 18px 18px}
.logo .mk{width:30px;height:30px;border-radius:8px;background:var(--ink);display:flex;align-items:center;
  justify-content:center;color:var(--paper);flex-shrink:0}
.logo b{font-family:'Archivo';font-size:15px;font-weight:600;letter-spacing:-.2px;white-space:nowrap}
.nav{padding:0 10px;display:flex;flex-direction:column;gap:1px;flex:1;overflow-y:auto}
.nav .sec{font-size:9.5px;text-transform:uppercase;letter-spacing:1.1px;color:var(--faint);
  font-weight:600;padding:14px 8px 6px}
.nav a{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:8px;font-size:13.5px;
  font-weight:500;color:var(--muted);cursor:pointer;transition:.12s;white-space:nowrap}
.nav a:hover{background:var(--sunk);color:var(--text)}
.nav a.on{background:var(--ink);color:var(--paper);font-weight:550}
.nav a .bdg{margin-left:auto;background:var(--neg);color:#fff;font-size:10px;font-weight:700;
  min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.nav a.on .bdg{background:var(--paper);color:var(--ink)}
.side-ft{padding:10px;border-top:1px solid var(--hair)}

.content{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--page);position:sticky;top:0;z-index:30;padding:18px 26px 10px}
.topbar .in{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.ttl h1{font-family:'Archivo';font-size:23px;font-weight:600;letter-spacing:-.6px;line-height:1.15}
.ttl p{color:var(--muted);font-size:13px;margin-top:2px}
.tacts{display:flex;gap:8px;align-items:center}
.body{padding:14px 26px 40px;flex:1}
.bottomnav{display:none}

/* ══ COMPONENTES ══ */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.ch{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px 0}
.ch h3{font-family:'Archivo';font-size:14px;font-weight:600;letter-spacing:-.1px}
.ch p{font-size:12px;color:var(--muted);margin-top:1px}
.cb{padding:14px 16px}
.cb-t{padding-top:12px}
.mb{margin-bottom:14px}
.g{display:grid;gap:14px}
.g-stat{grid-template-columns:repeat(4,1fr)}
.g-73{grid-template-columns:1.55fr 1fr}
.g-2{grid-template-columns:1fr 1fr}

/* stat */
.stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh)}
.stat.dark{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.stat .top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:11px}
.stat .k{font-size:11.5px;font-weight:550;color:var(--muted);letter-spacing:.1px}
.stat.dark .k{color:rgba(255,255,255,.62)}
.stat .ico{width:28px;height:28px;border-radius:7px;background:var(--sunk);display:flex;align-items:center;
  justify-content:center;color:var(--muted)}
.stat.dark .ico{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.stat .v{font-family:'Archivo';font-size:25px;font-weight:600;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.stat .f{font-size:11.5px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:6px}
.stat.dark .f{color:rgba(255,255,255,.6)}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px}
.c-up{background:var(--pos-bg);color:var(--pos)} .c-dn{background:var(--neg-bg);color:var(--neg)}
.stat.dark .c-up{background:rgba(79,180,137,.18);color:#7FD4AF}
.stat.dark .c-dn{background:rgba(217,112,92,.18);color:#EFA294}

/* chart */
.chart{display:flex;align-items:flex-end;gap:2px;height:150px;padding-top:6px}
.cg{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0}
.cbars{display:flex;align-items:flex-end;gap:3px;height:120px;justify-content:center;width:100%}
.cbars i{width:10px;border-radius:3px;display:block;min-height:2px}
.cbars i.a{background:var(--ink)} .cbars i.b{background:var(--pos);opacity:.5}
html[data-theme="dark"] .cbars i.a{background:var(--ink-soft)}
.cg span{font-size:10.5px;color:var(--faint);font-weight:500}
.leg{display:flex;gap:13px}
.leg span{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:500}
.leg i{width:9px;height:9px;border-radius:2px}

/* listas */
.lrow{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--hair)}
.lrow:last-child{border-bottom:none}
.lrow .ico{width:32px;height:32px;border-radius:8px;background:var(--sunk);display:flex;align-items:center;
  justify-content:center;color:var(--muted);flex-shrink:0}
.lrow .i{flex:1;min-width:0}
.lrow .i b{font-size:13.5px;font-weight:550;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lrow .i span{font-size:11.5px;color:var(--muted)}
.lrow .v{font-family:'Archivo';font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;white-space:nowrap}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* tabla */
.tw{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);font-weight:600;
  text-align:left;padding:8px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--hair);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:var(--raise)}
.tbl .r{text-align:right}
.dsc{font-weight:550;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  display:block;max-width:100%}
.sub2{display:none;font-size:11.5px;color:var(--muted);margin-top:1px}
.sm{font-size:12.5px;color:var(--muted);white-space:nowrap}
.mono{font-family:'Archivo';font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--muted);white-space:nowrap}
.amt{font-family:'Archivo';font-variant-numeric:tabular-nums;font-weight:600;font-size:13.5px;white-space:nowrap}
.pos{color:var(--pos)} .neg{color:var(--neg)} .inf{color:var(--info)}
.cdot{width:7px;height:7px;border-radius:2px;display:inline-block;margin-right:7px;vertical-align:0}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9.5px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;margin-left:6px;vertical-align:1px;
  background:var(--sunk);color:var(--muted)}
.tag.inf{background:var(--info-bg);color:var(--info)}
.acts{display:flex;gap:2px;justify-content:flex-end;opacity:0;transition:.12s}
tr:hover .acts{opacity:1}
@media(hover:none){.acts{opacity:1}}

/* botones */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 15px;border-radius:9px;
  font-size:13.5px;font-weight:550;border:1px solid transparent;transition:.12s;white-space:nowrap}
.btn:active{transform:translateY(.5px)}
.b-p{background:var(--ink);color:var(--paper)}
.b-p:hover{background:var(--ink-soft)}
.b-o{background:var(--paper);border-color:var(--line);color:var(--text)}
.b-o:hover{border-color:var(--muted);background:var(--raise)}
.b-g{background:var(--sunk);color:var(--text)}
.b-g:hover{background:var(--line)}
.b-pos{background:var(--pos);color:#fff} .b-pos:hover{opacity:.9}
.b-neg{background:var(--neg);color:#fff} .b-neg:hover{opacity:.9}
.b-s{padding:6px 11px;font-size:12.5px;border-radius:8px}
.b-w{width:100%}
.ib{width:28px;height:28px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;
  color:var(--faint);transition:.12s}
.ib:hover{background:var(--sunk);color:var(--text)}

/* alertas */
.al{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--hair)}
.al:last-child{border-bottom:none}
.al .i{flex:1;min-width:0}
.al .i b{font-size:13.5px;font-weight:550;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al .i span{font-size:11.5px;color:var(--muted)}
.al .v{font-family:'Archivo';font-variant-numeric:tabular-nums;font-weight:600;font-size:13.5px;white-space:nowrap}

/* mini card */
.mc{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.mc .h{padding:13px 15px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
  border-bottom:1px solid var(--hair)}
.mc.d .h{background:var(--ink);color:var(--paper);border-bottom:none}
.mc .h b{font-family:'Archivo';font-size:14px;font-weight:600;display:block}
.mc .h span{font-size:11.5px;color:var(--muted)}
.mc.d .h span{color:rgba(255,255,255,.6)}
.mc .b{padding:14px 15px}
.kv{display:flex;justify-content:space-between;align-items:baseline;padding:3.5px 0;font-size:12.5px}
.kv .k{color:var(--muted)}
.kv .v{font-family:'Archivo';font-variant-numeric:tabular-nums;font-weight:600;font-size:13.5px}
.bar{height:5px;background:var(--sunk);border-radius:3px;overflow:hidden;margin:9px 0 11px}
.bar i{display:block;height:100%;border-radius:3px}
.note{border-radius:9px;padding:11px 13px;margin-bottom:11px;border:1px solid transparent}
.note .k{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;opacity:.9}
.note .v{font-family:'Archivo';font-size:19px;font-weight:600;margin-top:2px;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.note .s{font-size:11.5px;margin-top:2px;opacity:.9}
.n-neg{background:var(--neg-bg);color:var(--neg)}
.n-warn{background:var(--warn-bg);color:var(--warn)}
.n-pos{background:var(--pos-bg);color:var(--pos)}
.n-flat{background:var(--sunk);color:var(--text)}
.ft{font-size:11px;color:var(--faint);margin-top:11px;padding-top:10px;border-top:1px solid var(--hair)}

/* mes */
.mbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.mnav{display:flex;gap:4px}
.nv{width:32px;height:32px;border-radius:8px;background:var(--paper);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;color:var(--muted)}
.nv:hover{border-color:var(--muted);color:var(--text)}
.mname{font-family:'Archivo';font-size:16px;font-weight:600;text-transform:capitalize;margin-left:4px}
.msum{display:flex;gap:0;margin-left:auto;background:var(--paper);border:1px solid var(--line);
  border-radius:10px;overflow:hidden}
.msum div{padding:7px 16px;border-right:1px solid var(--hair)}
.msum div:last-child{border-right:none}
.msum .k{font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);font-weight:600}
.msum .v{font-family:'Archivo';font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;margin-top:1px}

/* config */
.snav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;background:var(--paper);padding:4px;
  border:1px solid var(--line);border-radius:10px;width:fit-content;max-width:100%;overflow-x:auto}
.snav button{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:550;color:var(--muted);white-space:nowrap}
.snav button.on{background:var(--ink);color:var(--paper)}
.srow{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--hair);flex-wrap:wrap}
.srow:last-child{border-bottom:none}
.srow .i{flex:1;min-width:200px}
.srow .i b{font-size:13.5px;font-weight:550;display:block}
.srow .i span{font-size:12px;color:var(--muted);display:block;margin-top:1px}
.srow .c{min-width:190px}
.sw{width:42px;height:24px;border-radius:12px;background:var(--line);position:relative;transition:.18s;flex-shrink:0;cursor:pointer}
.sw i{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sw.on{background:var(--pos)} .sw.on i{left:21px}
.sws{display:flex;gap:7px;flex-wrap:wrap}
.swt{width:26px;height:26px;border-radius:7px;cursor:pointer;box-shadow:0 0 0 1px var(--line)}
.swt.on{box-shadow:0 0 0 2px var(--ink)}
.icp{display:flex;gap:7px;flex-wrap:wrap}
.icp button{width:40px;height:40px;border-radius:9px;border:1px solid var(--line);background:var(--paper);
  display:flex;align-items:center;justify-content:center;color:var(--muted)}
.icp button.on{border-color:var(--ink);background:var(--sunk);color:var(--text)}

/* form */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
label{font-size:12px;font-weight:550;color:var(--text)}
input,select{padding:10px 11px;border:1px solid var(--line);border-radius:9px;background:var(--paper);width:100%;transition:.12s}
input:focus,select:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(20,21,19,.07)}
html[data-theme="dark"] input:focus,html[data-theme="dark"] select:focus{box-shadow:0 0 0 3px rgba(255,255,255,.08)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.seg{display:flex;gap:7px;margin-bottom:14px}
.seg button{flex:1;padding:10px;border-radius:9px;font-weight:550;font-size:13.5px;border:1px solid var(--line);
  background:var(--paper);color:var(--muted);display:flex;align-items:center;justify-content:center;gap:7px}
.seg button.on-i{background:var(--pos-bg);border-color:var(--pos);color:var(--pos)}
.seg button.on-e{background:var(--neg-bg);border-color:var(--neg);color:var(--neg)}
.seg button.on-t{background:var(--info-bg);border-color:var(--info);color:var(--info)}
.seg button{padding:10px 8px;font-size:13px}

.ov{position:fixed;inset:0;background:rgba(20,21,19,.55);backdrop-filter:blur(2px);display:flex;
  align-items:flex-end;justify-content:center;z-index:200}
.md{background:var(--paper);border-radius:16px 16px 0 0;width:100%;max-width:440px;max-height:92vh;overflow-y:auto}
.mh{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;
  align-items:center;position:sticky;top:0;background:var(--paper);z-index:2}
.mh h3{font-family:'Archivo';font-size:15px;font-weight:600}
.mbd{padding:16px 18px}
.mf{padding:13px 18px calc(18px + env(safe-area-inset-bottom));display:flex;gap:9px}
.mf .btn{flex:1}
@media(min-width:640px){.ov{align-items:center;padding:20px}.md{border-radius:14px}}

.empty{text-align:center;padding:36px 18px;color:var(--muted)}
.empty .ico{width:40px;height:40px;border-radius:10px;background:var(--sunk);display:flex;align-items:center;
  justify-content:center;margin:0 auto 12px;color:var(--faint)}
.empty p{font-size:13px;margin-bottom:13px}
.hint{background:var(--sunk);border-radius:9px;padding:10px 13px;font-size:12px;color:var(--muted);line-height:1.5}
.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,90px);background:var(--ink);color:var(--paper);
  padding:10px 18px;border-radius:10px;font-weight:550;font-size:13px;z-index:300;transition:.24s;box-shadow:var(--sh2)}
.toast.show{transform:translate(-50%,0)}
.kbd{font-size:10px;padding:1px 5px;border:1px solid currentColor;border-radius:3px;opacity:.5}

/* ══ RESPONSIVE ══ */
@media(max-width:1180px){ .g-stat{grid-template-columns:repeat(2,1fr)} .g-73{grid-template-columns:1fr} }
@media(max-width:1023px){
  .side{width:60px}
  .logo{padding:18px 0;justify-content:center}
  .logo b{display:none}
  .nav{padding:0 8px}
  .nav a{justify-content:center;padding:10px 0}
  .nav a .txt{display:none}
  .nav .sec{display:none}
  .nav a .bdg{position:absolute;margin:0;transform:translate(11px,-11px)}
  .nav a{position:relative}
  .side-ft .btn span{display:none}
  .topbar{padding:16px 18px 10px} .body{padding:12px 18px 40px}
}
@media(max-width:760px){
  .g-2{grid-template-columns:1fr}
  .msum{margin-left:0;width:100%}
  .msum div{flex:1;padding:7px 10px}
}
@media(max-width:640px){
  body{padding-bottom:0}
  .side{display:none}
  .topbar{padding:14px 14px 8px;background:var(--paper);border-bottom:1px solid var(--line)}
  .ttl h1{font-size:19px}
  .body{padding:12px 14px calc(90px + env(safe-area-inset-bottom))}
  .g-stat{grid-template-columns:1fr 1fr;gap:10px}
  .stat{padding:12px 13px}
  .stat .v{font-size:21px}
  .stat .top{margin-bottom:8px}
  .hide-s{display:none!important}
  .sub2{display:block}
  .dsc{max-width:none}
  .tbl th,.tbl td{padding:9px 8px}
  .tbl th:first-child,.tbl td:first-child{padding-left:14px}
  .tbl th:last-child,.tbl td:last-child{padding-right:14px}
  .cb{padding:12px 14px}
  .ch{padding:13px 14px 0}
  .tacts .btn span{display:none}
  .tacts .btn{padding:9px 11px}
  .bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--paper);
    border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));
    align-items:center;justify-content:space-around}

/* ════════ ALMACENAMIENTO ════════ */

const D=f=>new Date(f+'T12:00:00');
function sumarDias(f,n){const d=D(f);d.setDate(d.getDate()+n);return iso(d);}
function conDia(a,m,dia){const u=new Date(a,m+1,0).getDate();return iso(new Date(a,m,Math.min(dia,u),12));}
function ultimoDia(dia,ref){ref=ref||hoy();const r=D(ref);let f=conDia(r.getFullYear(),r.getMonth(),dia);
  if(f>ref)f=conDia(r.getFullYear(),r.getMonth()-1,dia);return f;}
function proximoDia(dia,ref){ref=ref||hoy();const r=D(ref);let f=conDia(r.getFullYear(),r.getMonth(),dia);
  if(f<ref)f=conDia(r.getFullYear(),r.getMonth()+1,dia);return f;}
const diasHasta=f=>Math.round((D(f)-D(hoy()))/86400000);

/* ════════ DEFAULTS ════════ */
const PERFIL={nombre:'',simbolo:'S/',limiteMensual:0,diasAviso:7,tema:'claro'};

const INICIAL={

  billeteras:[

    diaPago:10,proxima:proximoDia(10),billeteraId:'w4',activo:true}],
  movimientos:[
    {id:uid(),fecha:hoy(),tipo:'Ingreso',monto:2800,descripcion:'Sueldo',categoria:'Sueldo',medioId:'w4'},
    {id:uid(),fecha:hoy(),tipo:'Egreso',monto:65,descripcion:'Almuerzo',categoria:'Comida',medioId:'w2'},
    {id:uid(),fecha:sumarDias(hoy(),-45),tipo:'Egreso',monto:750,descripcion:'Televisor',categoria:'Compras',medioId:'t1'},
    {id:uid(),fecha:sumarDias(hoy(),-20),tipo:'Egreso',monto:420,descripcion:'Zapatillas',categoria:'Compras',medioId:'t1'},
    {id:uid(),fecha:sumarDias(hoy(),-2),tipo:'Egreso',monto:180,descripcion:'Supermercado',categoria:'Comida',medioId:'t1'},
    {id:uid(),fecha:hoy(),tipo:'Egreso',monto:120,descripcion:'Recibo de luz',categoria:'Servicios',medioId:'w4'},
    {id:uid(),fecha:sumarDias(hoy(),-35),tipo:'Ingreso',monto:2800,descripcion:'Sueldo',categoria:'Sueldo',medioId:'w4'},
    {id:uid(),fecha:sumarDias(hoy(),-38),tipo:'Egreso',monto:640,descripcion:'Mercado',categoria:'Comida',medioId:'w2'},
    {id:uid(),fecha:sumarDias(hoy(),-70),tipo:'Ingreso',monto:2800,descripcion:'Sueldo',categoria:'Sueldo',medioId:'w4'},
    {id:uid(),fecha:sumarDias(hoy(),-72),tipo:'Egreso',monto:900,descripcion:'Gastos varios',categoria:'Otros',medioId:'w4'},

    {id:uid(),concepto:'Sueldo',tipo:'Ingreso',monto:2800,categoria:'Sueldo',medioId:'w4',frecuencia:'Mensual',proxima:sumarDias(hoy(),30),activo:true},
    {id:uid(),concepto:'Internet',tipo:'Egreso',monto:99,categoria:'Servicios',medioId:'w4',frecuencia:'Mensual',proxima:sumarDias(hoy(),6),activo:true},

let DB;
function normalizar(){
  DB.billeteras ||= []; DB.movimientos ||= []; DB.recurrentes ||= [];
  DB.tarjetas ||= []; DB.prestamos ||= [];
  DB.categorias = (DB.categorias&&DB.categorias.length)?DB.categorias:JSON.parse(JSON.stringify(CATS));
  DB.perfil = Object.assign({},PERFIL,DB.perfil||{});
  DB.billeteras.forEach(b=>{ if(!ICONOS.includes(b.icono)) b.icono = MAPI[b.icono] || 'wallet'; });
  aplicarTema();
}
function cargar(){
  const raw=store.get();
  try{ DB = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(INICIAL)); }
  catch(e){ DB = JSON.parse(JSON.stringify(INICIAL)); }
  normalizar();
}
function guardar(){ store.set(JSON.stringify(DB)); }

/* ════════ FORMATO ════════ */
const sim=()=>DB.perfil.simbolo||'S/';
const S=n=>sim()+' '+(+n||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const S0=n=>sim()+' '+Math.round(+n||0).toLocaleString('es-PE');
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const mesDe=f=>(f||'').slice(0,7);
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const nombreMes=ym=>{const[a,m]=ym.split('-');return MESES[+m-1]+' '+a;};
const fechaCorta=f=>{const[a,m,d]=f.split('-');return `${d} ${MESES[+m-1].slice(0,3)}`;};
const mesActual=()=>hoy().slice(0,7);
function mesRel(n){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+n);return d.toISOString().slice(0,7);}

/* ════════ CÁLCULOS ════════ */
const billetera=id=>DB.billeteras.find(b=>b.id===id);
const tarjeta=id=>DB.tarjetas.find(t=>t.id===id);
const medioNombre=id=>{const b=billetera(id);if(b)return b.nombre;const t=tarjeta(id);return t?t.nombre:'—';};
const medioIcono=id=>{const b=billetera(id);if(b)return b.icono||'wallet';return tarjeta(id)?'card':'wallet';};
const catObj=n=>DB.categorias.find(c=>c.nombre===n);
const catColor=n=>{const c=catObj(n);return c?c.color:'#9B9C93';};

const esFuturo=f=>f>hoy();
/* Saldo REAL de hoy: solo cuenta lo que ya ocurrió */
function saldo(id){
  const b=billetera(id); if(!b) return 0;
  return DB.movimientos.reduce((t,m)=>{
    if(esFuturo(m.fecha)) return t;
    if(m.tipo==='Transferencia'){          /* sale de una, entra a otra */
      if(m.medioId===id) return t - +m.monto;
      if(m.destinoId===id) return t + +m.monto;
      return t;
    }
    if(m.medioId!==id) return t;
    return m.tipo==='Ingreso' ? t + +m.monto : t - +m.monto;
  }, +b.saldoInicial||0);
}
const dineroPropio=()=>DB.billeteras.reduce((t,b)=>t+saldo(b.id),0);
/* Movimientos con fecha futura: aún no afectan tu saldo */
const programados=()=>DB.movimientos.filter(m=>esFuturo(m.fecha));
function netoProgramado(){
  return programados().reduce((t,m)=>{
    if(m.tipo==='Transferencia') return t;   /* no cambia tu total */
    return m.tipo==='Ingreso' ? t + +m.monto : t - +m.monto;
  },0);
}

function estadoTarjeta(t){
  const consumos=DB.movimientos.filter(m=>m.tipo==='Egreso'&&m.medioId===t.id&&!esFuturo(m.fecha));
  const pagos=DB.movimientos.filter(m=>m.tipo==='Pago'&&m.tarjetaId===t.id&&!esFuturo(m.fecha));
  const deuda=Math.max(0,consumos.reduce((a,m)=>a+ +m.monto,0)-pagos.reduce((a,m)=>a+ +m.monto,0));
  const cierreUlt=ultimoDia(t.diaCierre);
  const cierreProx=proximoDia(t.diaCierre,sumarDias(hoy(),1));
  const sinFacturar=consumos.filter(m=>m.fecha>cierreUlt).reduce((a,m)=>a+ +m.monto,0);
  const porPagar=Math.max(0,deuda-sinFacturar);
  const vence=proximoDia(t.diaPago);
  return {deuda,porPagar,sinFacturar,vence,dias:diasHasta(vence),
    disponible:Math.max(0,(+t.linea||0)-deuda), uso:t.linea?deuda/t.linea:0, cierreUlt,cierreProx};
}
const deudaTarjetas=()=>DB.tarjetas.reduce((a,t)=>a+estadoTarjeta(t).deuda,0);
const creditoDisponible=()=>DB.tarjetas.reduce((a,t)=>a+estadoTarjeta(t).disponible,0);
function estadoPrestamo(p){
  const restantes=Math.max(0,(+p.cuotas||0)-(+p.pagadas||0));
  return {restantes,pendiente:restantes*(+p.cuota||0),
    avance:p.cuotas?(+p.pagadas||0)/p.cuotas:0, dias:diasHasta(p.proxima), terminado:restantes===0};
}
const deudaPrestamos=()=>DB.prestamos.reduce((a,p)=>a+estadoPrestamo(p).pendiente,0);
const deudaTotal=()=>deudaTarjetas()+deudaPrestamos();

/* ════════ OBLIGACIONES CON FECHA ════════
   Una deuda no es un monto suelto: vence un día concreto.
   Aquí se arma el calendario real de lo que hay que pagar y cuándo. */
function cuotasProgramadas(){
  const out=[];
  DB.prestamos.forEach(p=>{
    if(!p.activo) return;
    const e=estadoPrestamo(p);
    let f=p.proxima;
    for(let i=0;i<e.restantes;i++){
      out.push({fecha:f,monto:+p.cuota,nombre:p.nombre,clase:'prestamo',id:p.id,
                detalle:`Cuota ${(+p.pagadas||0)+i+1} de ${p.cuotas}`});
      f=conDia(D(f).getFullYear(),D(f).getMonth()+1,p.diaPago);
    }
  });
  return out;
}
function pagosTarjetaProgramados(){
  const out=[];
  DB.tarjetas.forEach(t=>{
    const e=estadoTarjeta(t);
    if(e.porPagar>0.01)
      out.push({fecha:e.vence,monto:e.porPagar,nombre:t.nombre,clase:'tarjeta',id:t.id,detalle:'Facturado'});
    if(e.sinFacturar>0.01){
      const fp=proximoDia(t.diaPago,sumarDias(e.cierreProx,1));
      out.push({fecha:fp,monto:e.sinFacturar,nombre:t.nombre,clase:'tarjeta',id:t.id,
                detalle:`Cierra el ${fechaCorta(e.cierreProx)}`});
    }
  });
  return out;
}
const obligaciones=()=>[...cuotasProgramadas(),...pagosTarjetaProgramados()].sort((a,b)=>a.fecha.localeCompare(b.fecha));
const obligacionesMes=ym=>obligaciones().filter(o=>mesDe(o.fecha)===ym);
const totalObligacionesMes=ym=>obligacionesMes(ym).reduce((a,o)=>a+o.monto,0);

/* Recurrentes proyectados hacia adelante, sin crear movimientos */
function recurrentesProyectados(hastaYM){
  const out=[];
  DB.recurrentes.forEach(r=>{
    if(!r.activo||!r.proxima) return;
    let f=r.proxima,g=0;
    while(mesDe(f)<=hastaYM&&g++<400){
      out.push({fecha:f,tipo:r.tipo,monto:+r.monto,concepto:r.concepto,categoria:r.categoria});
      f=siguienteFecha(f,r.frecuencia);
    }
  });
  return out;
}

/* Proyección de los 12 meses del año */
function proyeccionAnual(anio){
  const hastaYM=`${anio}-12`;
  const rec=recurrentesProyectados(hastaYM);
  const obl=obligaciones();
  const act=mesActual();
  let acum=dineroPropio();
  const filas=[];
  for(let m=1;m<=12;m++){
    const ym=`${anio}-${String(m).padStart(2,'0')}`;
    const t=totalesMes(ym);
    const rI=rec.filter(r=>mesDe(r.fecha)===ym&&r.tipo==='Ingreso').reduce((a,r)=>a+r.monto,0);
    const rE=rec.filter(r=>mesDe(r.fecha)===ym&&r.tipo==='Egreso').reduce((a,r)=>a+r.monto,0);
    const o=obl.filter(x=>mesDe(x.fecha)===ym).reduce((a,x)=>a+x.monto,0);
    const ing=t.ing+rI, egr=t.egr+rE, flujo=ing-egr-o;
    const futuro = ym>act, esActual = ym===act;
    if(ym>=act) acum+=flujo;
    filas.push({ym,mes:m,ing,egr,obl:o,flujo,acum:(ym>=act?acum:null),futuro,esActual,
                pasado:ym<act, vacio:!ing&&!egr&&!o});
  }
  return filas;
}

function totalesMes(ym){
  let ing=0,egr=0,pag=0,tra=0;
  for(const m of DB.movimientos){
    if(mesDe(m.fecha)!==ym) continue;
    if(m.tipo==='Ingreso') ing+=+m.monto;
    else if(m.tipo==='Pago') pag+=+m.monto;
    else if(m.tipo==='Transferencia') tra+=+m.monto;   /* mueve, no gasta */
    else egr+=+m.monto;
  }
  return {ing,egr,pag,tra,neto:ing-egr};
}
function porCategoria(ym){
  const map={};
  for(const m of DB.movimientos){
    if(mesDe(m.fecha)!==ym||m.tipo!=='Egreso') continue;
    const k=m.categoria||'Otros'; map[k]=(map[k]||0)+ +m.monto;
  }
  return Object.entries(map).map(([nombre,total])=>({nombre,total,color:catColor(nombre)}))
    .sort((a,b)=>b.total-a.total);
}
const pctCambio=(h,a)=> a>0 ? (h-a)/a : (h>0?1:0);

function recordatorios(){
  const l=[];
  DB.tarjetas.forEach(t=>{const e=estadoTarjeta(t);
    if(e.porPagar>0.01) l.push({tipo:'tarjeta',id:t.id,titulo:t.nombre,sub:'Tarjeta · vence '+fechaCorta(e.vence),
      monto:e.porPagar,fecha:e.vence,dias:e.dias});});
  DB.prestamos.forEach(p=>{const e=estadoPrestamo(p);
    if(!p.activo||e.terminado) return;
    l.push({tipo:'prestamo',id:p.id,titulo:p.nombre,sub:`Cuota ${(+p.pagadas||0)+1} de ${p.cuotas} · ${fechaCorta(p.proxima)}`,
      monto:+p.cuota,fecha:p.proxima,dias:e.dias});});
  return l.sort((a,b)=>a.fecha.localeCompare(b.fecha));
}
const urgencia=d=> d<=3?'neg' : d<=(DB.perfil.diasAviso||7)?'warn' : 'pos';
const colU={neg:'var(--neg)',warn:'var(--warn)',pos:'var(--pos)'};
function textoDias(d){
  if(d<0) return `venció hace ${-d} d`;
  if(d===0) return 'vence hoy';
  if(d===1) return 'vence mañana';
  return `en ${d} días`;
}

const PASOS={Semanal:{d:7},Quincenal:{d:15},Mensual:{m:1},Bimestral:{m:2},Trimestral:{m:3},Semestral:{m:6},Anual:{m:12}};
function siguienteFecha(f,frec){
  const p=PASOS[frec]||PASOS.Mensual; const d=D(f);
  if(p.d){ d.setDate(d.getDate()+p.d); return iso(d); }
  return conDia(d.getFullYear(), d.getMonth()+p.m, d.getDate());
}
function crearDesde(r,fecha){
  DB.movimientos.push({id:uid(),fecha,tipo:r.tipo,monto:+r.monto,descripcion:r.concepto,
    categoria:r.categoria,medioId:r.medioId,recurrenteId:r.id});
}
function generarVencidos(){
  let n=0; const lim=hoy();
  for(const r of DB.recurrentes){
    if(!r.activo||!r.proxima) continue;
    let g=0;
    while(r.proxima<=lim && g++<200){ crearDesde(r,r.proxima); r.proxima=siguienteFecha(r.proxima,r.frecuencia); n++; }
  }
  if(n) guardar();
  return n;
}
function generarVeces(id,veces){
  const r=DB.recurrentes.find(x=>x.id===id);
  veces=Math.max(1,Math.min(60,+veces||1));
  for(let i=0;i<veces;i++){ crearDesde(r,r.proxima); r.proxima=siguienteFecha(r.proxima,r.frecuencia); }
  pintar(); aviso(`${veces} ${veces===1?'movimiento generado':'movimientos generados'}`);
}

function borrarTarjeta(id){

    <div class="field"><label>Tipo</label><select id="k_t">

    <div class="field"><label>Color</label><div class="sws" id="pal">
      ${PALETA.map(x=>`<div class="swt ${x===c.color?'on':''}" data-c="${x}" style="background:${x}" onclick="pickColor('${x}')"></div>`).join('')}
    </div><input type="hidden" id="k_c" value="${c.color}"></div>`,
    ()=>{
      const n=val('k_n').trim(); if(!n){aviso('Ponle un nombre');return false;}

                   DB.recurrentes.forEach(r=>{if(r.categoria===v)r.categoria=n;}); }

function pickColor(x){
  $('k_c').value=x;
  document.querySelectorAll('#pal .swt').forEach(s=>s.classList.toggle('on',s.dataset.c===x));
}
function borrarCategoria(id){
  const c=DB.categorias.find(x=>x.id===id);
  const u=DB.movimientos.filter(m=>m.categoria===c.nombre).length;
  if(!confirm(u?`"${c.nombre}" se usa en ${u} movimientos. Quedarán sin categoría. ¿Continuar?`:`¿Eliminar "${c.nombre}"?`)) return;
  DB.categorias=DB.categorias.filter(x=>x.id!==id); pintar(); aviso('Categoría eliminada');
}

/* ════════ FORMULARIOS ════════ */
let tipoSel='Egreso';
function opcMedio(sel,soloB){
  let h=`<optgroup label="Billeteras">${DB.billeteras.map(b=>
    `<option value="${b.id}" ${sel===b.id?'selected':''}>${esc(b.nombre)}</option>`).join('')}</optgroup>`;
  if(!soloB && DB.tarjetas.length)
    h+=`<optgroup label="Tarjetas de crédito">${DB.tarjetas.map(t=>
      `<option value="${t.id}" ${sel===t.id?'selected':''}>${esc(t.nombre)}</option>`).join('')}</optgroup>`;
  return h;
}
function opcCat(sel,tipo){
  return DB.categorias.filter(c=>c.tipo===tipo)
    .map(c=>`<option value="${esc(c.nombre)}" ${sel===c.nombre?'selected':''}>${esc(c.nombre)}</option>`).join('');
}
function formMov(id,tipo,medio){
  const m=id?DB.movimientos.find(x=>x.id===id):null;
  tipoSel=m?m.tipo:(tipo||'Egreso');
  if(tipoSel==='Pago') tipoSel='Egreso';
  if(!DB.billeteras.length){ aviso('Primero crea una billetera'); return formBilletera(); }
  abrir(id?'Editar movimiento':'Nuevo movimiento',`
    <div class="seg">
      <button id="sI" onclick="setTipo('Ingreso')">${ic('down',15)}Ingreso</button>
      <button id="sE" onclick="setTipo('Egreso')">${ic('up',15)}Egreso</button>
      <button id="sT" onclick="setTipo('Transferencia')">${ic('swap',15)}Traslado</button></div>
    <div class="field"><label>Importe</label>
      <input id="f_monto" type="number" step="0.01" inputmode="decimal" value="${m?m.monto:''}" placeholder="0.00"></div>
    <div class="field"><label id="labM">¿Con qué pagaste?</label>
      <select id="f_medio">${opcMedio(m?m.medioId:medio, tipoSel==='Ingreso')}</select>
      <div id="avT" style="display:none;font-size:12px;color:var(--info);background:var(--info-bg);padding:9px 11px;border-radius:8px">
        Con tarjeta no sale dinero de tus billeteras: sube tu deuda y la pagas en su fecha.</div></div>
    <div class="field" id="wDest" style="display:none"><label>¿A dónde lo pasas?</label>
      <select id="f_dest">${opcMedio(m?m.destinoId:null,false)}</select>
      <div id="avD" style="display:none;font-size:12px;color:var(--info);background:var(--info-bg);padding:9px 11px;border-radius:8px">
        Al elegir una tarjeta se registra como pago de esa tarjeta y baja tu deuda.</div></div>
    <div class="field"><label>Concepto</label>
      <input id="f_desc" value="${m?esc(m.descripcion):''}" placeholder="Ej. Almuerzo, recibo de luz"></div>
    <div class="two">
      <div class="field" id="wCat"><label>Categoría</label><select id="f_cat"></select></div>
      <div class="field"><label>Fecha</label><input id="f_fecha" type="date" value="${m?m.fecha:hoy()}"></div>
    </div>`,
    ()=>{
      const mo=+val('f_monto'); if(!mo||mo<=0){aviso('Escribe un importe');return false;}
      const org=val('f_medio');
      if(tipoSel==='Transferencia'){
        const dst=val('f_dest');
        if(!dst){aviso('Elige la billetera de destino');return false;}
        if(dst===org){aviso('El origen y el destino no pueden ser el mismo');return false;}
        if(tarjeta(org)){aviso('Un traslado debe salir de una billetera, no de una tarjeta');return false;}
        const t=tarjeta(dst);
        /* Trasladar a una tarjeta ES pagarla */
        const d = t
          ? {fecha:val('f_fecha')||hoy(),tipo:'Pago',monto:mo,descripcion:val('f_desc')||('Pago '+t.nombre),
             categoria:'Tarjeta',medioId:org,tarjetaId:dst}
          : {fecha:val('f_fecha')||hoy(),tipo:'Transferencia',monto:mo,
             descripcion:val('f_desc')||`De ${medioNombre(org)} a ${medioNombre(dst)}`,
             categoria:'Traslado',medioId:org,destinoId:dst};
        if(id) Object.assign(DB.movimientos.find(x=>x.id===id),{destinoId:null,tarjetaId:null},d);
        else DB.movimientos.push({id:uid(),...d});
        pintar(); aviso(t?'Pago de tarjeta registrado':'Traslado registrado'); return true;
      }
      const d={fecha:val('f_fecha')||hoy(),tipo:tipoSel,monto:mo,descripcion:val('f_desc'),
               categoria:val('f_cat'),medioId:org,destinoId:null};
      if(id) Object.assign(DB.movimientos.find(x=>x.id===id),d);
      else DB.movimientos.push({id:uid(),...d});
      pintar(); aviso(id?'Movimiento actualizado':(tipoSel==='Ingreso'?'Ingreso registrado':'Gasto registrado')); return true;
    });
  setTipo(tipoSel, m?m.categoria:null, m?(m.destinoId||m.tarjetaId):null);
}
function setTipo(t,catSel,dstSel){
  tipoSel=t;
  const i=$('sI'), e=$('sE'), tr=$('sT'); if(!i) return;
  i.className=t==='Ingreso'?'on-i':''; e.className=t==='Egreso'?'on-e':'';
  if(tr) tr.className=t==='Transferencia'?'on-t':'';
  const esTra=t==='Transferencia';
  const sel=$('f_medio'), lab=$('labM'), wD=$('wDest'), wC=$('wCat');
  if(sel){
    const act=sel.value;
    lab.textContent = t==='Ingreso'?'¿A dónde entró?':esTra?'¿De dónde sale?':'¿Con qué pagaste?';
    sel.innerHTML=opcMedio(act, t==='Ingreso'||esTra);   /* traslado sale de billetera */
    sel.onchange=revT; revT();
  }
  if(wD){
    wD.style.display=esTra?'flex':'none';
    const d=$('f_dest');
    if(d&&esTra){ d.innerHTML=opcMedio(dstSel||d.value,false); d.onchange=revD; revD(); }
  }
  if(wC) wC.style.display=esTra?'none':'flex';
  const c=$('f_cat'); if(c&&!esTra){ const prev=catSel||c.value; c.innerHTML=opcCat(prev,t); }
}
function revT(){ const s=$('f_medio'), a=$('avT');
  if(s&&a) a.style.display = (tipoSel!=='Transferencia'&&tarjeta(s.value))?'block':'none'; }
function revD(){ const s=$('f_dest'), a=$('avD'); if(s&&a) a.style.display = tarjeta(s.value)?'block':'none'; }
function borrarMov(id){
  if(!confirm('¿Eliminar este movimiento?')) return;
  const m=DB.movimientos.find(x=>x.id===id);
  if(m&&m.prestamoId){ const p=DB.prestamos.find(x=>x.id===m.prestamoId);
    if(p&&p.pagadas>0){ p.pagadas--; p.proxima=conDia(D(p.proxima).getFullYear(),D(p.proxima).getMonth()-1,p.diaPago); } }
  DB.movimientos=DB.movimientos.filter(x=>x.id!==id); pintar(); aviso('Movimiento eliminado');
}

/* ════════ UI ════════ */
const val=id=>{const e=$(id);return e?e.value:'';};
let alGuardar=null;
function abrir(titulo,cuerpo,onSave){
  alGuardar=onSave;
  $('modal').innerHTML=`
    <div class="ov" onclick="if(event.target===this)cerrar()"><div class="md">
      <div class="mh"><h3>${titulo}</h3><button class="ib" onclick="cerrar()">${ic('x',15)}</button></div>
      <div class="mbd">${cuerpo}</div>
      <div class="mf"><button class="btn b-o" onclick="cerrar()">Cancelar</button>
        <button class="btn b-p" onclick="confirmar()">Guardar <span class="kbd">⏎</span></button></div>
    </div></div>`;
  setTimeout(()=>{const i=document.querySelector('.mbd input');if(i){i.focus();if(i.select)i.select();}},60);
}
function cerrar(){ $('modal').innerHTML=''; alGuardar=null; }
function confirmar(){ if(!alGuardar) return cerrar(); if(alGuardar()!==false) cerrar(); }
document.addEventListener('keydown',e=>{
  if(!alGuardar) return;
  if(e.key==='Enter'){
    const t=e.target;
    if(t&&(t.tagName==='TEXTAREA'||t.tagName==='BUTTON'||t.type==='file')) return;
    e.preventDefault(); confirmar();
  }
  if(e.key==='Escape'){ e.preventDefault(); cerrar(); }
});
let tT;
function aviso(m){
  const t=$('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ════════ DATOS ════════ */
function bajar(n,c,t){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([c],{type:t})); a.download=n; a.click();
}
function respaldar(){ bajar(`respaldo-mi-dinero-${hoy()}.json`,JSON.stringify(DB,null,2),'application/json'); aviso('Respaldo descargado'); }
function restaurar(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const l=new FileReader();
  l.onload=()=>{
    try{
      const d=JSON.parse(l.result);
      if(!d.billeteras||!d.movimientos) throw 0;
      if(!confirm('Esto reemplaza TODOS tus datos actuales. ¿Continuar?')) return;
      DB=d; normalizar(); guardar(); pintar(); aviso('Datos restaurados');
    }catch(e){ aviso('El archivo no es un respaldo válido'); }
    input.value='';
  };
  l.readAsText(f);
}
function exportar(){
  const f=[['Fecha','Tipo','Concepto','Categoria','Medio','Importe']];
  DB.movimientos.slice().sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(m=>{
    f.push([m.fecha,m.tipo,m.descripcion||'',m.categoria||'',medioNombre(m.medioId),(+m.monto).toFixed(2)]);
  });
  bajar('mis-movimientos.csv','\ufeff'+f.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n'),'text/csv;charset=utf-8');
  aviso('CSV descargado');
}
function reiniciar(){
  if(!confirm('Se borrará todo y volverá al ejemplo inicial. ¿Seguro?')) return;
  DB=JSON.parse(JSON.stringify(INICIAL)); normalizar(); pintar(); aviso('Todo reiniciado');
}

/* ════════ ARRANQUE ════════ */
cargar();
const gen=generarVencidos();
pintar();
if(gen) setTimeout(()=>aviso(`${gen} movimiento${gen===1?'':'s'} recurrente${gen===1?'':'s'} registrado${gen===1?'':'s'}`),600);
</script>
