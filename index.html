<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi Dinero</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='9' fill='%23F1603D'/><path d='M8 20.5l5.5-6 4 3.8L24.5 10' stroke='white' stroke-width='2.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --page:#E9EAEC; --shell:#FFFFFF; --surf:#FFFFFF; --surf2:#F6F7F8; --surf3:#F1F2F4;
  --line:#E9EAEC; --hair:#F0F1F3;
  --ink:#16181D; --text:#1B1D22; --muted:#868C96; --muted2:#A6ACB6;
  --acc:#F1603D; --acc2:#FF8A63; --acc-bg:#FEEDE8;
  --in:#12946A; --in-bg:#E6F5EF;
  --out:#D4462F; --out-bg:#FDECE9;
  --pur:#5B41A0; --pur-bg:#F0ECFA;
  --warn:#B5780F; --warn-bg:#FCF4E4;
  --sh:0 1px 2px rgba(18,20,25,.04), 0 8px 24px rgba(18,20,25,.05);
  --r:16px;
}
html[data-theme="dark"]{
  --page:#0C0E12; --shell:#15181E; --surf:#15181E; --surf2:#1C2028; --surf3:#232833;
  --line:#252A33; --hair:#212630;
  --ink:#F2F4F7; --text:#E6E9EE; --muted:#8B939F; --muted2:#6C7482;
  --acc-bg:#3A1D14;
  --in:#3FBF92; --in-bg:#12291F;
  --out:#F0715B; --out-bg:#2E1611;
  --pur:#A98BF0; --pur-bg:#231C39;
  --warn:#E0A337; --warn-bg:#2B2010;
  --sh:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.28);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--page);color:var(--text);
  font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;padding:16px;transition:background .2s}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px;color:var(--text)}
.n{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.lab{font-size:10.5px;text-transform:uppercase;letter-spacing:.9px;font-weight:700;color:var(--muted)}

/* SHELL */
.shell{max-width:1290px;margin:0 auto;background:var(--shell);border-radius:24px;display:flex;
  min-height:calc(100vh - 32px);overflow:hidden;box-shadow:0 4px 30px rgba(18,20,25,.07)}
.rail{width:62px;flex-shrink:0;border-right:1px solid var(--line);display:flex;flex-direction:column;
  align-items:center;padding:18px 0;gap:5px}
.rail .rb{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:15px;transition:.14s}
.rail .rb:hover{background:var(--surf2);color:var(--text)}
.rail .rb.on{background:var(--ink);color:var(--shell)}
.rail .sp{flex:1}
.main{flex:1;min-width:0;padding:18px 26px 30px;overflow:hidden}

/* TOPBAR */
.top{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;letter-spacing:-.2px;
  background:var(--surf2);padding:7px 14px 7px 8px;border-radius:999px}
.brand i{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800}
.pills{display:flex;gap:2px;background:var(--surf2);padding:4px;border-radius:999px;overflow-x:auto;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pills button{padding:7px 15px;border-radius:999px;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap}
.pills button:hover{color:var(--text)}
.pills button.on{background:var(--ink);color:var(--shell)}
.tools{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb{width:36px;height:36px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;
  justify-content:center;color:var(--muted);font-size:14px;position:relative}
.tb:hover{color:var(--text)}
.tb .pip{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--acc);border:2px solid var(--surf2)}

/* GREETING */
.greet h1{font-size:27px;font-weight:700;letter-spacing:-.9px;line-height:1.15}
.greet p{color:var(--muted);font-size:13.5px;margin-top:3px}
.greet{margin-bottom:20px}

/* GRID */
.g{display:grid;gap:14px}
.g-main{grid-template-columns:1.05fr 1.25fr 1.3fr}
.g-2{grid-template-columns:1fr 1fr}
.g-btm{grid-template-columns:1.05fr 2.6fr}
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.cb{padding:16px 18px}
.ch{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.ch h3{font-size:14.5px;font-weight:700;letter-spacing:-.2px}
.ch p{font-size:12px;color:var(--muted);margin-top:1px}
.flush{padding:0 6px 6px}

/* BALANCE */
.bal .t{font-size:13px;color:var(--muted);font-weight:600}
.bal .v{font-family:'Space Grotesk';font-size:31px;font-weight:700;letter-spacing:-1.3px;margin:5px 0 6px}
.delta{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:2px 8px;border-radius:999px}
.d-up{background:var(--in-bg);color:var(--in)} .d-dn{background:var(--out-bg);color:var(--out)}
.acts2{display:flex;gap:8px;margin:14px 0 4px}
.wbox{background:var(--surf2);border-radius:12px;padding:11px 12px;margin-top:12px}
.wbox .hd{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:9px}
.wlist{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.wlist::-webkit-scrollbar{display:none}
.wchip{background:var(--surf);border:1px solid var(--line);border-radius:10px;padding:9px 11px;min-width:118px;flex-shrink:0}
.wchip .nm{font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wchip .am{font-family:'Space Grotesk';font-weight:600;font-size:14px;margin-top:4px}
.wchip .st{font-size:10.5px;color:var(--muted);margin-top:1px}

/* STAT CARDS */
.stats4{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.st{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:var(--sh)}
.st.hl{background:linear-gradient(150deg,var(--acc),var(--acc2));border-color:transparent;color:#fff}
.st .hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.st .k{font-size:12.5px;font-weight:600;color:var(--muted)}
.st.hl .k{color:rgba(255,255,255,.92)}
.st .ic{width:26px;height:26px;border-radius:8px;background:var(--surf2);display:flex;align-items:center;
  justify-content:center;font-size:12px;flex-shrink:0}
.st.hl .ic{background:rgba(255,255,255,.22)}
.st .v{font-family:'Space Grotesk';font-size:24px;font-weight:700;letter-spacing:-1px;margin:9px 0 6px}
.st.hl .delta{background:rgba(255,255,255,.24);color:#fff}
.st .sub{font-size:11px;color:var(--muted)}
.st.hl .sub{color:rgba(255,255,255,.85)}

/* CHART */
.chart{height:158px;display:flex;align-items:flex-end;gap:3px;padding-top:8px}
.cg{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.cbars{display:flex;align-items:flex-end;gap:3px;height:126px;width:100%;justify-content:center}
.cbars i{width:11px;border-radius:4px 4px 2px 2px;display:block;min-height:3px;transition:height .4s}
.cbars i.a{background:var(--ink)}
.cbars i.b{background:var(--acc)}
.cg span{font-size:10.5px;color:var(--muted);font-weight:600}
.leg{display:flex;gap:14px;align-items:center}
.leg span{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);font-weight:600}
.leg i{width:8px;height:8px;border-radius:3px}

/* LIMITE */
.lim .bar{height:9px;background:var(--surf3);border-radius:999px;overflow:hidden;margin:11px 0 8px}
.lim .bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.lim .ends{display:flex;justify-content:space-between;font-size:11.5px}
.lim .ends b{font-family:'Space Grotesk';font-weight:600}

/* CARDS VISUAL */
.ccard{border-radius:14px;padding:13px 14px;color:#fff;min-width:180px;flex-shrink:0;cursor:pointer;
  background:linear-gradient(140deg,#22252D,#0F1115);position:relative;overflow:hidden}
.ccard.b{background:linear-gradient(140deg,var(--acc),#D8452A)}
.ccard .tp{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;font-weight:700}
.ccard .chip{background:rgba(255,255,255,.2);padding:2px 8px;border-radius:999px}
.ccard .amt{font-family:'Space Grotesk';font-size:19px;font-weight:700;margin:14px 0 2px;letter-spacing:-.5px}
.ccard .l{font-size:10px;opacity:.8;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
.ccard .ft{font-size:10.5px;opacity:.85;margin-top:10px;display:flex;justify-content:space-between}
.crow{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:2px}
.crow::-webkit-scrollbar{display:none}

/* TABLA */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2);font-weight:700;
  text-align:left;padding:9px 12px;background:var(--surf2);white-space:nowrap}
.tbl th:first-child{border-radius:9px 0 0 9px} .tbl th:last-child{border-radius:0 9px 9px 0}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--hair);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:var(--surf2)}
.tbl .r{text-align:right}
.dsc{font-weight:600;font-size:13.5px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
.sm{font-size:12.5px;color:var(--muted)}
.mono{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--muted);white-space:nowrap}
.amt{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-weight:600;font-size:13.5px;white-space:nowrap}
.pos{color:var(--in)} .neg{color:var(--out)} .pur{color:var(--pur)} .acc{color:var(--acc)}
.cdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:1px;flex-shrink:0}
.tag{display:inline-block;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:700;
  letter-spacing:.3px;text-transform:uppercase;margin-left:6px;vertical-align:1px}
.t-auto{background:var(--surf3);color:var(--muted)}
.t-pago{background:var(--pur-bg);color:var(--pur)}
.acts{opacity:0;transition:.12s;white-space:nowrap}
tr:hover .acts{opacity:1}
@media(hover:none){.acts{opacity:1}}
.ib{width:27px;height:27px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;
  color:var(--muted2);font-size:13px}
.ib:hover{background:var(--surf3);color:var(--text)}

/* BOTONES */
.btn{padding:9px 16px;border-radius:10px;font-weight:600;font-size:13.5px;display:inline-flex;
  align-items:center;justify-content:center;gap:7px;border:1px solid transparent;transition:.13s}
.btn:active{transform:translateY(1px)}
.btn-d{background:var(--ink);color:var(--shell);flex:1}
.btn-d:hover{opacity:.9}
.btn-l{background:var(--surf2);color:var(--text);flex:1}
.btn-l:hover{background:var(--surf3)}
.btn-a{background:var(--acc);color:#fff}
.btn-a:hover{background:#DD523C}
.btn-o{background:var(--surf);border-color:var(--line);color:var(--text)}
.btn-o:hover{border-color:var(--muted2)}
.btn-xs{padding:6px 11px;font-size:12.5px;border-radius:8px}
.btn-w{width:100%}

/* AVISOS */
.alert{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;margin-bottom:6px;background:var(--surf2)}
.alert:last-child{margin-bottom:0}
.alert .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.alert .t{flex:1;min-width:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alert .w{font-size:11.5px;font-weight:600;white-space:nowrap}
.alert .a{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-weight:600;font-size:13.5px;white-space:nowrap}

/* MINI CARDS */
.mc{background:var(--surf);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);overflow:hidden}
.mc .h{padding:12px 15px;display:flex;justify-content:space-between;align-items:center;gap:8px;
  background:var(--surf2);border-bottom:1px solid var(--hair)}
.mc.crd .h{background:linear-gradient(135deg,#251F3D,#463A70);color:#fff;border-bottom:none}
.mc .h .nm{font-weight:700;font-size:13.5px}
.mc .h .bk{font-size:11px;opacity:.72;margin-top:1px}
.mc .b{padding:14px 15px}
.kv{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0}
.kv .k{font-size:12px;color:var(--muted)}
.kv .v{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-weight:600;font-size:13.5px}
.bigv{font-family:'Space Grotesk';font-size:22px;font-weight:700;letter-spacing:-.6px}
.foot{font-size:11px;color:var(--muted2);margin-top:11px;padding-top:10px;border-top:1px solid var(--hair)}
.bar5{height:5px;background:var(--surf3);border-radius:999px;overflow:hidden;margin:9px 0 11px}
.bar5 i{display:block;height:100%;border-radius:999px}
.pill{border-radius:11px;padding:10px 12px;margin-bottom:10px}
.pill .k{font-size:10px;text-transform:uppercase;letter-spacing:.7px;font-weight:700;opacity:.85}
.pill .v{font-family:'Space Grotesk';font-size:19px;font-weight:700;margin-top:1px;letter-spacing:-.5px}
.pill .s{font-size:11.5px;margin-top:1px;opacity:.92}
.p-due{background:var(--out-bg);color:var(--out)}
.p-soon{background:var(--warn-bg);color:var(--warn)}
.p-ok{background:var(--in-bg);color:var(--in)}
.p-nu{background:var(--surf2);color:var(--text)}

/* MES */
.mbar{display:flex;align-items:center;gap:9px;margin-bottom:16px;flex-wrap:wrap}
.mbar .nm{font-family:'Space Grotesk';font-size:17px;font-weight:600;text-transform:capitalize;min-width:140px}
.nv{width:33px;height:33px;border-radius:9px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:15px}
.nv:hover{background:var(--surf3)}
.stats{display:flex;gap:1px;background:var(--line);border-radius:11px;overflow:hidden;margin-left:auto}
.stats div{background:var(--surf);padding:8px 16px}
.stats .k{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2);font-weight:700}
.stats .v{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-size:14.5px;font-weight:600;margin-top:1px}

/* CONFIG */
.setnav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.setnav button{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;background:var(--surf2);color:var(--muted)}
.setnav button.on{background:var(--ink);color:var(--shell)}
.srow{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--hair);flex-wrap:wrap}
.srow:last-child{border-bottom:none}
.srow .i{flex:1;min-width:190px}
.srow .i b{font-size:13.5px;font-weight:600;display:block}
.srow .i span{font-size:12px;color:var(--muted)}
.srow .c{min-width:180px}
.sw{width:46px;height:26px;border-radius:999px;background:var(--surf3);position:relative;transition:.18s;flex-shrink:0}
.sw i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.sw.on{background:var(--in)} .sw.on i{left:23px}
.swatch{width:26px;height:26px;border-radius:8px;border:2px solid var(--surf);box-shadow:0 0 0 1px var(--line);cursor:pointer;flex-shrink:0}
.swatch.on{box-shadow:0 0 0 2px var(--ink)}

/* FORM */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
label{font-size:12px;font-weight:600;color:var(--text)}
input,select{padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--surf);width:100%}
input:focus,select:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-bg)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg{display:flex;gap:8px;margin-bottom:14px}
.seg button{flex:1;padding:10px;border-radius:9px;font-weight:600;font-size:13.5px;border:1px solid var(--line);background:var(--surf);color:var(--muted)}
.seg button.on-in{background:var(--in-bg);border-color:var(--in);color:var(--in)}
.seg button.on-out{background:var(--out-bg);border-color:var(--out);color:var(--out)}

.overlay{position:fixed;inset:0;background:rgba(12,14,18,.6);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:var(--surf);border-radius:18px 18px 0 0;width:100%;max-width:450px;max-height:92vh;overflow-y:auto}
.mh{padding:16px 19px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;
  align-items:center;position:sticky;top:0;background:var(--surf);z-index:2}
.mh h3{font-size:15.5px;font-weight:700;letter-spacing:-.2px}
.mbd{padding:17px 19px}
.mf{padding:13px 19px 19px;display:flex;gap:9px}
.mf .btn{flex:1}
@media(min-width:640px){.overlay{align-items:center;padding:20px}.modal{border-radius:18px}}

.empty{text-align:center;padding:34px 18px;color:var(--muted)}
.empty .e{font-size:24px;opacity:.35;margin-bottom:8px}
.empty p{font-size:13px;margin-bottom:12px}
.hint{background:var(--surf2);border-left:2px solid var(--acc);padding:9px 12px;border-radius:0 8px 8px 0;
  font-size:12px;color:var(--muted);line-height:1.5}
.toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,90px);background:var(--ink);color:var(--shell);
  padding:10px 20px;border-radius:11px;font-weight:600;font-size:13px;z-index:200;transition:.25s;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{transform:translate(-50%,0)}
.kbd{font-size:10px;padding:2px 5px;border:1px solid currentColor;border-radius:4px;opacity:.55;font-family:'Space Grotesk'}
.mb{margin-bottom:14px}
.hide-s{display:table-cell}

@media(max-width:1080px){ .g-main,.g-btm{grid-template-columns:1fr} .stats4{grid-template-columns:1fr 1fr} }
@media(max-width:760px){
  body{padding:0}
  .shell{border-radius:0;min-height:100vh}
  .rail{display:none}
  .main{padding:14px 14px 26px}
  .greet h1{font-size:22px}
  .g-2{grid-template-columns:1fr}
  .hide-s{display:none}
  .stats{margin-left:0;width:100%}
  .stats div{flex:1}
  .tools{width:100%;margin-left:0;justify-content:flex-end}
}
</style>
</head>
<body>
<div class="shell">
  <aside class="rail">
    <button class="rb" id="railTheme" onclick="toggleTema()" title="Tema claro / oscuro">◐</button>
    <div style="height:10px"></div>
    <button class="rb" data-v="inicio" title="Inicio">◈</button>
    <button class="rb" data-v="historial" title="Historial">▤</button>
    <button class="rb" data-v="tarjetas" title="Tarjetas">▭</button>
    <button class="rb" data-v="prestamos" title="Préstamos">◫</button>
    <button class="rb" data-v="recurrentes" title="Recurrentes">↻</button>
    <button class="rb" data-v="billeteras" title="Billeteras">◧</button>
    <div class="sp"></div>
    <button class="rb" data-v="config" title="Configuración">⚙</button>
  </aside>

  <div class="main">
    <div class="top">
      <div class="brand"><i>M</i>Mi Dinero</div>
      <nav class="pills" id="pills">
        <button data-v="inicio">Inicio</button>
        <button data-v="historial">Historial</button>

<script>
/* ════════ ALMACENAMIENTO ════════ */
const KEY='mi_dinero_v2';
let memoria=null;
const store={
  get(){ try{ return localStorage.getItem(KEY); }catch(e){ return memoria; } },
  set(v){ try{ localStorage.setItem(KEY,v); }catch(e){ memoria=v; } }
};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const hoy=()=>new Date().toISOString().slice(0,10);
const iso=d=>d.toISOString().slice(0,10);
const D=f=>new Date(f+'T12:00:00');
function sumarDias(f,n){const d=D(f);d.setDate(d.getDate()+n);return iso(d);}
function conDia(anio,mes,dia){
  const ultimo=new Date(anio,mes+1,0).getDate();
  return iso(new Date(anio,mes,Math.min(dia,ultimo),12));
}
function ultimoDia(dia,ref){
  ref=ref||hoy(); const r=D(ref);
  let f=conDia(r.getFullYear(),r.getMonth(),dia);
  if(f>ref) f=conDia(r.getFullYear(),r.getMonth()-1,dia);
  return f;
}
function proximoDia(dia,ref){
  ref=ref||hoy(); const r=D(ref);
  let f=conDia(r.getFullYear(),r.getMonth(),dia);
  if(f<ref) f=conDia(r.getFullYear(),r.getMonth()+1,dia);
  return f;
}
const diasHasta=f=>Math.round((D(f)-D(hoy()))/86400000);

/* ════════ DEFAULTS ════════ */
const PERFIL={nombre:'', simbolo:'S/', limiteMensual:0, diasAviso:7, tema:'claro'};
const CATS=[
  {id:'c1',nombre:'Sueldo',tipo:'Ingreso',color:'#12946A'},
  {id:'c2',nombre:'Negocio',tipo:'Ingreso',color:'#1E88C7'},
  {id:'c3',nombre:'Venta',tipo:'Ingreso',color:'#7A9E1B'},
  {id:'c4',nombre:'Otros ingresos',tipo:'Ingreso',color:'#5B41A0'},
  {id:'c5',nombre:'Comida',tipo:'Egreso',color:'#F1603D'},
  {id:'c6',nombre:'Transporte',tipo:'Egreso',color:'#E08A16'},
  {id:'c7',nombre:'Servicios',tipo:'Egreso',color:'#2E86AB'},
  {id:'c8',nombre:'Vivienda',tipo:'Egreso',color:'#8B5E3C'},
  {id:'c9',nombre:'Salud',tipo:'Egreso',color:'#C43D6B'},
  {id:'c10',nombre:'Educación',tipo:'Egreso',color:'#4A6FD4'},
  {id:'c11',nombre:'Compras',tipo:'Egreso',color:'#A05BC0'},
  {id:'c12',nombre:'Ocio',tipo:'Egreso',color:'#D4462F'},
  {id:'c13',nombre:'Préstamo',tipo:'Egreso',color:'#5C6B7A'},
  {id:'c14',nombre:'Tarjeta',tipo:'Egreso',color:'#5B41A0'},
  {id:'c15',nombre:'Otros',tipo:'Egreso',color:'#868C96'},
];
const PALETA=['#F1603D','#12946A','#1E88C7','#E08A16','#5B41A0','#C43D6B','#7A9E1B','#2E86AB','#8B5E3C','#5C6B7A','#A05BC0','#D4462F'];

const INICIAL={
  perfil:{...PERFIL, limiteMensual:2000},
  categorias:JSON.parse(JSON.stringify(CATS)),
  billeteras:[
    {id:'w1',nombre:'Efectivo',icono:'💵',saldoInicial:300},
    {id:'w2',nombre:'Yape',icono:'📱',saldoInicial:450},
    {id:'w3',nombre:'Plin',icono:'💬',saldoInicial:120},
    {id:'w4',nombre:'Cuenta de ahorros',icono:'🏦',saldoInicial:2500},
  ],
  tarjetas:[
    {id:'t1',nombre:'Visa Clásica',banco:'BCP',linea:6000,diaCierre:25,diaPago:15},
    {id:'t2',nombre:'Mastercard',banco:'Interbank',linea:4500,diaCierre:5,diaPago:20},
  ],
  prestamos:[
    {id:'p1',nombre:'Crédito vehicular',entidad:'BBVA',cuota:963.79,cuotas:36,pagadas:10,
     diaPago:10,proxima:proximoDia(10),billeteraId:'w4',activo:true},
  ],
  movimientos:[
    {id:uid(),fecha:hoy(),tipo:'Ingreso',monto:2800,descripcion:'Sueldo',categoria:'Sueldo',medioId:'w4'},
    {id:uid(),fecha:hoy(),tipo:'Egreso',monto:65,descripcion:'Almuerzo',categoria:'Comida',medioId:'w2'},
    {id:uid(),fecha:sumarDias(hoy(),-45),tipo:'Egreso',monto:750,descripcion:'Televisor',categoria:'Compras',medioId:'t1'},
    {id:uid(),fecha:sumarDias(hoy(),-20),tipo:'Egreso',monto:420,descripcion:'Zapatillas',categoria:'Compras',medioId:'t1'},
    {id:uid(),fecha:sumarDias(hoy(),-2),tipo:'Egreso',monto:180,descripcion:'Supermercado',categoria:'Comida',medioId:'t1'},
    {id:uid(),fecha:hoy(),tipo:'Egreso',monto:120,descripcion:'Recibo de luz',categoria:'Servicios',medioId:'w4'},
    {id:uid(),fecha:sumarDias(hoy(),-35),tipo:'Ingreso',monto:2800,descripcion:'Sueldo',categoria:'Sueldo',medioId:'w4'},
    {id:uid(),fecha:sumarDias(hoy(),-38),tipo:'Egreso',monto:640,descripcion:'Mercado',categoria:'Comida',medioId:'w2'},
    {id:uid(),fecha:sumarDias(hoy(),-70),tipo:'Ingreso',monto:2800,descripcion:'Sueldo',categoria:'Sueldo',medioId:'w4'},
    {id:uid(),fecha:sumarDias(hoy(),-72),tipo:'Egreso',monto:900,descripcion:'Gastos varios',categoria:'Otros',medioId:'w4'},
  ],
  recurrentes:[
    {id:uid(),concepto:'Sueldo',tipo:'Ingreso',monto:2800,categoria:'Sueldo',medioId:'w4',frecuencia:'Mensual',proxima:sumarDias(hoy(),30),activo:true},
    {id:uid(),concepto:'Internet',tipo:'Egreso',monto:99,categoria:'Servicios',medioId:'w4',frecuencia:'Mensual',proxima:sumarDias(hoy(),6),activo:true},
  ],
};

let DB;
function cargar(){
  const raw=store.get();
  try{ DB = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(INICIAL)); }
  catch(e){ DB = JSON.parse(JSON.stringify(INICIAL)); }
  DB.billeteras ||= []; DB.movimientos ||= []; DB.recurrentes ||= [];
  DB.tarjetas ||= []; DB.prestamos ||= [];
  DB.categorias = (DB.categorias && DB.categorias.length) ? DB.categorias : JSON.parse(JSON.stringify(CATS));
  DB.perfil = Object.assign({}, PERFIL, DB.perfil||{});
  aplicarTema();
}
function guardar(){ store.set(JSON.stringify(DB)); }

/* ════════ FORMATO ════════ */
const sim=()=>DB.perfil.simbolo||'S/';
const S=n=>sim()+' '+(+n||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const S0=n=>sim()+' '+Math.round(+n||0).toLocaleString('es-PE');
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const mesDe=f=>(f||'').slice(0,7);
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const nombreMes=ym=>{const[a,m]=ym.split('-');return MESES[+m-1]+' '+a;};
const fechaCorta=f=>{const[a,m,d]=f.split('-');return `${d} ${MESES[+m-1].slice(0,3)}`;};
const mesActual=()=>hoy().slice(0,7);
function mesRel(n){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+n);return d.toISOString().slice(0,7);}

/* ════════ SALDOS ════════ */
const billetera=id=>DB.billeteras.find(b=>b.id===id);
const tarjeta=id=>DB.tarjetas.find(t=>t.id===id);
const medioNombre=id=>{const b=billetera(id);if(b)return b.nombre;const t=tarjeta(id);return t?t.nombre:'—';};
const medioIcono=id=>{const b=billetera(id);if(b)return b.icono||'💼';return tarjeta(id)?'💳':'';};
const catObj=n=>DB.categorias.find(c=>c.nombre===n);
const catColor=n=>{const c=catObj(n);return c?c.color:'#A6ACB6';};

function saldo(id){
  const b=billetera(id); if(!b) return 0;
  return DB.movimientos.reduce((t,m)=>{
    if(m.medioId!==id) return t;
    if(m.tipo==='Ingreso') return t + +m.monto;
    return t - +m.monto;
  }, +b.saldoInicial||0);
}
const dineroPropio=()=>DB.billeteras.reduce((t,b)=>t+saldo(b.id),0);

function estadoTarjeta(t){
  const consumos=DB.movimientos.filter(m=>m.tipo==='Egreso'&&m.medioId===t.id);
  const pagos=DB.movimientos.filter(m=>m.tipo==='Pago'&&m.tarjetaId===t.id);
  const totalConsumo=consumos.reduce((a,m)=>a + +m.monto,0);
  const totalPagado=pagos.reduce((a,m)=>a + +m.monto,0);
  const deuda=Math.max(0,totalConsumo-totalPagado);
  const cierreUlt=ultimoDia(t.diaCierre);
  const cierreProx=proximoDia(t.diaCierre,sumarDias(hoy(),1));
  const sinFacturar=consumos.filter(m=>m.fecha>cierreUlt).reduce((a,m)=>a + +m.monto,0);
  const porPagar=Math.max(0,deuda-sinFacturar);
  const vence=proximoDia(t.diaPago);
  const dias=diasHasta(vence);
  const disponible=Math.max(0,(+t.linea||0)-deuda);
  const uso=t.linea? deuda/t.linea : 0;
  return {deuda,porPagar,sinFacturar,disponible,uso,cierreUlt,cierreProx,vence,dias};
}
const deudaTarjetas=()=>DB.tarjetas.reduce((a,t)=>a+estadoTarjeta(t).deuda,0);
const creditoDisponible=()=>DB.tarjetas.reduce((a,t)=>a+estadoTarjeta(t).disponible,0);

function estadoPrestamo(p){
  const restantes=Math.max(0,(+p.cuotas||0)-(+p.pagadas||0));
  const pendiente=restantes*(+p.cuota||0);
  const avance=p.cuotas? (+p.pagadas||0)/p.cuotas : 0;
  return {restantes,pendiente,avance,dias:diasHasta(p.proxima),terminado:restantes===0};
}
const deudaPrestamos=()=>DB.prestamos.reduce((a,p)=>a+estadoPrestamo(p).pendiente,0);
const deudaTotal=()=>deudaTarjetas()+deudaPrestamos();

function totalesMes(ym){
  let ing=0,egr=0,pag=0;
  for(const m of DB.movimientos){
    if(mesDe(m.fecha)!==ym) continue;
    if(m.tipo==='Ingreso') ing+=+m.monto;
    else if(m.tipo==='Pago') pag+=+m.monto;
    else egr+=+m.monto;
  }
  return {ing,egr,pag,neto:ing-egr};
}
function porCategoria(ym){
  const map={};
  for(const m of DB.movimientos){
    if(mesDe(m.fecha)!==ym||m.tipo!=='Egreso') continue;
    const k=m.categoria||'Otros';
    map[k]=(map[k]||0)+ +m.monto;
  }
  return Object.entries(map).map(([nombre,total])=>({nombre,total,color:catColor(nombre)}))
    .sort((a,b)=>b.total-a.total);
}
const pctCambio=(hoyV,antesV)=> antesV>0 ? (hoyV-antesV)/antesV : (hoyV>0?1:0);

/* ════════ RECORDATORIOS ════════ */
function recordatorios(){
  const l=[];
  for(const t of DB.tarjetas){
    const e=estadoTarjeta(t);
    if(e.porPagar>0.01) l.push({tipo:'tarjeta',id:t.id,titulo:t.nombre,monto:e.porPagar,fecha:e.vence,dias:e.dias});
  }
  for(const p of DB.prestamos){
    const e=estadoPrestamo(p);
    if(!p.activo||e.terminado) continue;
    l.push({tipo:'prestamo',id:p.id,titulo:p.nombre,monto:+p.cuota,fecha:p.proxima,dias:e.dias});
  }
  return l.sort((a,b)=>a.fecha.localeCompare(b.fecha));
}
const urgencia=d=> d<=3?'due' : d<=(DB.perfil.diasAviso||7)?'soon' : 'ok';
const colorU={due:'var(--out)',soon:'var(--warn)',ok:'var(--in)'};
function textoDias(d){
  if(d<0) return `venció hace ${-d}d`;
  if(d===0) return 'vence hoy';
  if(d===1) return 'mañana';
  return `en ${d} días`;
}

/* ════════ RECURRENTES ════════ */
const PASOS={Semanal:{d:7},Quincenal:{d:15},Mensual:{m:1},Bimestral:{m:2},Trimestral:{m:3},Semestral:{m:6},Anual:{m:12}};
function siguienteFecha(f,frec){
  const p=PASOS[frec]||PASOS.Mensual;
  const d=D(f);
  if(p.d){ d.setDate(d.getDate()+p.d); return iso(d); }
  return conDia(d.getFullYear(), d.getMonth()+p.m, d.getDate());
}
function crearDesde(r,fecha){
  DB.movimientos.push({id:uid(),fecha,tipo:r.tipo,monto:+r.monto,descripcion:r.concepto,
    categoria:r.categoria,medioId:r.medioId,recurrenteId:r.id});
}
function generarVencidos(){
  let n=0; const limite=hoy();
  for(const r of DB.recurrentes){
    if(!r.activo||!r.proxima) continue;
    let g=0;
    while(r.proxima<=limite && g++<200){
      crearDesde(r,r.proxima);
      r.proxima=siguienteFecha(r.proxima,r.frecuencia); n++;
    }
  }
  if(n) guardar();
  return n;
}
function generarVeces(id,veces){
  const r=DB.recurrentes.find(x=>x.id===id);
  veces=Math.max(1,Math.min(60,+veces||1));
  for(let i=0;i<veces;i++){ crearDesde(r,r.proxima); r.proxima=siguienteFecha(r.proxima,r.frecuencia); }
  pintar(); aviso(`${veces} ${veces===1?'movimiento generado':'movimientos generados'}`);
}

/* ════════ TEMA ════════ */
function aplicarTema(){
  document.documentElement.setAttribute('data-theme', DB.perfil.tema==='oscuro'?'dark':'light');
  const b=document.getElementById('railTheme'); if(b) b.textContent = DB.perfil.tema==='oscuro'?'☀':'◐';

let vista='inicio', mesVisto=mesActual(), setTab='general';

function pintar(){
  guardar();

document.getElementById('pills').onclick=e=>{const b=e.target.closest('button');if(b)irA(b.dataset.v);};

        <td class="r amt ${ing?'pos':pago?'pur':'neg'}">${ing?'+':'−'}${S(m.monto)}</td>

          <button class="ib" onclick="borrarMov('${m.id}')">✕</button></span></td>`:''}

function vHistorial(){
  const t=totalesMes(mesVisto);
  const lista=DB.movimientos.filter(m=>mesDe(m.fecha)===mesVisto)
    .sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id.localeCompare(a.id));
  app().innerHTML=`
    <div class="greet"><h1>Historial</h1><p>Tus movimientos mes por mes.</p></div>
    <div class="mbar">
      <button class="nv" onclick="moverMes(-1)">‹</button>
      <button class="nv" onclick="moverMes(1)">›</button>
      <div class="nm">${nombreMes(mesVisto)}</div>
      <div class="stats">
        <div><div class="k">Entró</div><div class="v pos">${S0(t.ing)}</div></div>
        <div><div class="k">Gastaste</div><div class="v neg">${S0(t.egr)}</div></div>
        <div><div class="k">Diferencia</div><div class="v" style="color:${t.neto>=0?'var(--in)':'var(--out)'}">${t.neto>=0?'+':'−'}${S0(Math.abs(t.neto))}</div></div>
      </div>
    </div>
    ${t.pag>0?`<div class="hint mb">Además pagaste <b>${S(t.pag)}</b> a tus tarjetas. No suma como gasto: ya se contó al comprar.</div>`:''}
    <div class="card">
      <div class="ch"><h3>${lista.length} movimiento${lista.length===1?'':'s'}</h3>
        <button class="btn btn-a btn-xs" onclick="formMov()">＋ Agregar</button></div>
      ${lista.length?`<div class="cb flush">${tablaMovs(lista)}</div>`
        :`<div class="empty"><div class="e">▤</div><p>Sin movimientos en ${nombreMes(mesVisto)}.</p>
          <button class="btn btn-a btn-xs" onclick="formMov()">Registrar uno</button></div>`}
    </div>`;
}
function moverMes(n){
  let [a,m]=mesVisto.split('-').map(Number);
  m+=n; if(m<1){m=12;a--;} if(m>12){m=1;a++;}
  mesVisto=`${a}-${String(m).padStart(2,'0')}`; pintar();
}

function formCategoria(id){
  const c=id?DB.categorias.find(x=>x.id===id):{tipo:'Egreso',color:PALETA[0]};
  abrir(id?'Editar categoría':'Nueva categoría',`

    <div class="field"><label>Tipo</label>
      <select id="k_tipo"><option ${c.tipo==='Ingreso'?'selected':''}>Ingreso</option><option ${c.tipo==='Egreso'?'selected':''}>Egreso</option></select></div>
    <div class="field"><label>Color</label>
      <div style="display:flex;gap:7px;flex-wrap:wrap" id="pal">
        ${PALETA.map(x=>`<div class="swatch ${x===c.color?'on':''}" data-c="${x}" style="background:${x}" onclick="pickColor('${x}')"></div>`).join('')}
      </div><input type="hidden" id="k_col" value="${c.color}"></div>`,
    ()=>{
      const nom=val('k_nom').trim();
      if(!nom){ aviso('Ponle un nombre'); return false; }
      const d={nombre:nom,tipo:val('k_tipo'),color:val('k_col')||PALETA[0]};
      if(id){
        const viejo=DB.categorias.find(x=>x.id===id).nombre;
        Object.assign(DB.categorias.find(x=>x.id===id),d);
        if(viejo!==nom){
          DB.movimientos.forEach(m=>{ if(m.categoria===viejo) m.categoria=nom; });
          DB.recurrentes.forEach(r=>{ if(r.categoria===viejo) r.categoria=nom; });
        }
      } else DB.categorias.push({id:uid(),...d});
      pintar(); aviso(id?'Categoría actualizada':'Categoría creada'); return true;
    });

function pickColor(x){
  document.getElementById('k_col').value=x;
  document.querySelectorAll('#pal .swatch').forEach(s=>s.classList.toggle('on',s.dataset.c===x));
}
function borrarCategoria(id){
  const c=DB.categorias.find(x=>x.id===id);
  const usos=DB.movimientos.filter(m=>m.categoria===c.nombre).length;
  if(!confirm(usos?`"${c.nombre}" se usa en ${usos} movimientos. Quedarán sin categoría. ¿Continuar?`:`¿Eliminar "${c.nombre}"?`)) return;
  DB.categorias=DB.categorias.filter(x=>x.id!==id);
  pintar(); aviso('Categoría eliminada');
}

function setTipo(t,catSel){
  tipoSel=t;
  const i=document.getElementById('sIng'), e=document.getElementById('sEgr');
  if(!i) return;
  i.className=t==='Ingreso'?'on-in':''; e.className=t==='Egreso'?'on-out':'';
  const sel=document.getElementById('f_medio'), lab=document.getElementById('labMedio');
  if(sel){
    const actual=sel.value;
    lab.textContent = t==='Ingreso'?'¿A dónde entró?':'¿Con qué pagaste?';
    sel.innerHTML=opcionesMedio(actual, t==='Ingreso');
    sel.onchange=revisarTarjeta; revisarTarjeta();
  }
  const c=document.getElementById('f_cat');
  if(c){ const prev=catSel||c.value; c.innerHTML=opcionesCat(prev,t); }
}
function revisarTarjeta(){
  const sel=document.getElementById('f_medio'), av=document.getElementById('avisoTarjeta');
  if(!sel||!av) return;
  av.style.display = tarjeta(sel.value) ? 'block' : 'none';
}
function borrarMov(id){
  if(!confirm('¿Eliminar este movimiento?')) return;
  const m=DB.movimientos.find(x=>x.id===id);
  if(m&&m.prestamoId){
    const p=DB.prestamos.find(x=>x.id===m.prestamoId);
    if(p&&p.pagadas>0){ p.pagadas--; p.proxima=conDia(D(p.proxima).getFullYear(),D(p.proxima).getMonth()-1,p.diaPago); }
  }
  DB.movimientos=DB.movimientos.filter(x=>x.id!==id); pintar(); aviso('Movimiento eliminado');
}

/* ════════ UI ════════ */
const val=id=>{const e=document.getElementById(id);return e?e.value:'';};
let alGuardar=null;
function abrir(titulo,cuerpo,onSave){
  alGuardar=onSave;
  document.getElementById('modal').innerHTML=`
    <div class="overlay" onclick="if(event.target===this)cerrar()">
      <div class="modal">
        <div class="mh"><h3>${titulo}</h3><button class="ib" onclick="cerrar()">✕</button></div>
        <div class="mbd">${cuerpo}</div>
        <div class="mf"><button class="btn btn-o" onclick="cerrar()">Cancelar</button>
          <button class="btn btn-a" onclick="confirmar()">Guardar <span class="kbd">⏎</span></button></div>
      </div></div>`;
  setTimeout(()=>{const i=document.querySelector('.mbd input');if(i){i.focus();if(i.select)i.select();}},60);
}
function cerrar(){ document.getElementById('modal').innerHTML=''; alGuardar=null; }
function confirmar(){ if(!alGuardar) return cerrar(); if(alGuardar()!==false) cerrar(); }
document.addEventListener('keydown',e=>{
  if(!alGuardar) return;
  if(e.key==='Enter'){
    const t=e.target;
    if(t&&(t.tagName==='TEXTAREA'||t.tagName==='BUTTON'||t.type==='file')) return;
    e.preventDefault(); confirmar();
  }
  if(e.key==='Escape'){ e.preventDefault(); cerrar(); }
});

let tT;
function aviso(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ════════ DATOS ════════ */
function bajar(nombre,contenido,tipo){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([contenido],{type:tipo}));
  a.download=nombre; a.click();
}
function respaldar(){
  bajar(`respaldo-mi-dinero-${hoy()}.json`, JSON.stringify(DB,null,2), 'application/json');
  aviso('Respaldo descargado');
}
function restaurar(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const lector=new FileReader();
  lector.onload=()=>{
    try{
      const d=JSON.parse(lector.result);
      if(!d.billeteras||!d.movimientos) throw new Error('formato');
      if(!confirm('Esto reemplaza TODOS tus datos actuales. ¿Continuar?')) return;
      DB=d; cargar2(d); guardar(); pintar(); aviso('Datos restaurados');
    }catch(err){ aviso('El archivo no es un respaldo válido'); }
    input.value='';
  };
  lector.readAsText(f);
}
function cargar2(d){
  DB=d;
  DB.billeteras ||= []; DB.movimientos ||= []; DB.recurrentes ||= [];
  DB.tarjetas ||= []; DB.prestamos ||= [];
  DB.categorias = (DB.categorias&&DB.categorias.length)?DB.categorias:JSON.parse(JSON.stringify(CATS));
  DB.perfil = Object.assign({},PERFIL,DB.perfil||{});
  aplicarTema();
}
function exportar(){
  const filas=[['Fecha','Tipo','Descripcion','Categoria','Medio','Monto']];
  DB.movimientos.slice().sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(m=>{
    filas.push([m.fecha,m.tipo,m.descripcion||'',m.categoria||'',medioNombre(m.medioId),(+m.monto).toFixed(2)]);
  });
  const csv=filas.map(f=>f.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  bajar('mis-movimientos.csv','\ufeff'+csv,'text/csv;charset=utf-8');
  aviso('CSV descargado');
}
function reiniciar(){
  if(!confirm('Se borrará todo y volverá al ejemplo inicial. ¿Seguro?')) return;
  DB=JSON.parse(JSON.stringify(INICIAL)); aplicarTema(); pintar(); aviso('Todo reiniciado');
}

/* ════════ ARRANQUE ════════ */
cargar();
const generados=generarVencidos();
pintar();
if(generados) setTimeout(()=>aviso(`${generados} movimiento${generados===1?'':'s'} recurrente${generados===1?'':'s'} registrado${generados===1?'':'s'}`),600);
</script>
