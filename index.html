<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi Sistema Financiero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16212B; --ink-soft:#243543;
  --bg:#EDF0F3; --card:#FFFFFF; --line:#DDE3E9; --line-soft:#EDF1F4;
  --text:#1B2733; --muted:#6B7A88;
  --in:#0E7A5F; --in-bg:#E6F4EF;
  --out:#B0392F; --out-bg:#FBEBE9;
  --accent:#0E6E63;
  --shadow:0 1px 2px rgba(20,32,43,.05), 0 6px 20px rgba(20,32,43,.07);
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:80px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:15px}
.num{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums}

/* ---------- HEADER ---------- */
header{background:var(--ink);color:#fff;padding:18px 20px 0}
.hwrap{max-width:1000px;margin:0 auto}
.htop{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.logo{font-family:'Space Grotesk';font-size:18px;font-weight:700;letter-spacing:-.2px}
.logo span{color:#8FA6B4;font-weight:500}
.tabs{display:flex;gap:2px;overflow-x:auto}
.tabs button{padding:11px 16px;font-size:14px;font-weight:600;color:#93A7B5;border-bottom:3px solid transparent;white-space:nowrap;border-radius:8px 8px 0 0}
.tabs button:hover{color:#fff}
.tabs button.on{color:#fff;border-color:#fff;background:rgba(255,255,255,.07)}

/* ---------- LAYOUT ---------- */
main{max-width:1000px;margin:0 auto;padding:22px 20px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.pad{padding:20px}
h2{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700;margin-bottom:14px}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;gap:14px}
.mb{margin-bottom:16px}

/* ---------- SALDO TOTAL ---------- */
.total{background:var(--ink);color:#fff;border-radius:var(--r);padding:26px 24px;margin-bottom:16px}
.total .lbl{font-size:13px;color:#93A7B5;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.total .big{font-family:'Space Grotesk';font-size:42px;font-weight:700;letter-spacing:-1.4px;margin:6px 0 14px;line-height:1}
.total .mini{display:flex;gap:26px;flex-wrap:wrap}
.total .mini div{font-size:13px;color:#A9BCC8}
.total .mini b{display:block;font-family:'Space Grotesk';font-size:17px;color:#fff;font-weight:600;margin-top:2px}

/* ---------- BOTONES ---------- */
.btn{padding:11px 18px;border-radius:10px;font-weight:600;font-size:14.5px;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.15s;border:1.5px solid transparent}
.btn:active{transform:scale(.98)}
.btn-in{background:var(--in);color:#fff;flex:1}
.btn-in:hover{background:#0B6650}
.btn-out{background:var(--out);color:#fff;flex:1}
.btn-out:hover{background:#963028}
.btn-dark{background:var(--ink);color:#fff}
.btn-dark:hover{background:var(--ink-soft)}
.btn-line{background:#fff;border-color:var(--line);color:var(--text)}
.btn-line:hover{border-color:var(--ink);}
.btn-sm{padding:7px 13px;font-size:13.5px;border-radius:9px}
.quick{display:flex;gap:12px;margin-bottom:16px}
.icon-btn{width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);font-size:15px}
.icon-btn:hover{background:var(--bg);color:var(--ink)}

/* ---------- BILLETERAS ---------- */
.wallets{grid-template-columns:repeat(auto-fill,minmax(215px,1fr))}
.wallet{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px;box-shadow:var(--shadow);transition:.15s}
.wallet:hover{border-color:#C3CDD6}
.wallet .top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.wallet .emoji{width:38px;height:38px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.wallet .nm{font-weight:600;font-size:14.5px;line-height:1.25;flex:1;min-width:0}
.wallet .amt{font-family:'Space Grotesk';font-size:23px;font-weight:600;letter-spacing:-.5px}
.wallet .sub{font-size:12px;color:var(--muted);margin-top:3px}
.neg{color:var(--out)} .pos{color:var(--in)}
.add-wallet{border:2px dashed var(--line);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-weight:600;font-size:14px;min-height:118px;transition:.15s}
.add-wallet:hover{border-color:var(--accent);color:var(--accent);background:#fff}

/* ---------- MOVIMIENTOS ---------- */
.mov{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line-soft)}
.mov:last-child{border-bottom:none}
.mov .ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.mov .ic.i{background:var(--in-bg);color:var(--in)}
.mov .ic.e{background:var(--out-bg);color:var(--out)}
.mov .info{flex:1;min-width:0}
.mov .d{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mov .m{font-size:12.5px;color:var(--muted);margin-top:1px}
.mov .val{font-family:'Space Grotesk';font-weight:600;font-size:15.5px;white-space:nowrap}
.mov .acts{display:flex;gap:2px;opacity:0;transition:.15s}
.mov:hover .acts{opacity:1}
@media(hover:none){.mov .acts{opacity:1}}
.chip{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--bg);color:var(--muted);margin-left:6px}

/* ---------- MES ---------- */
.monthbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.monthbar .mname{font-family:'Space Grotesk';font-size:19px;font-weight:600;text-transform:capitalize}
.nav-m{width:38px;height:38px;border-radius:10px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-m:hover{border-color:var(--ink)}
.msum{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-radius:12px;overflow:hidden;margin-bottom:16px}
.msum div{background:#fff;padding:14px}
.msum .l{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
.msum .v{font-family:'Space Grotesk';font-size:19px;font-weight:600;margin-top:3px}

/* ---------- TABLA RECURRENTES ---------- */
.rec{display:flex;align-items:center;gap:13px;padding:15px 0;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
.rec:last-child{border-bottom:none}
.rec .info{flex:1;min-width:180px}
.rec .d{font-weight:600;font-size:14.5px}
.rec .m{font-size:12.5px;color:var(--muted);margin-top:2px}
.rec .gen{display:flex;align-items:center;gap:6px}
.rec .gen input{width:52px;padding:6px 8px;border:1.5px solid var(--line);border-radius:8px;text-align:center;font-size:13.5px}
.pausado{opacity:.5}

/* ---------- FORMS ---------- */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-size:13px;font-weight:600;color:var(--ink-soft)}
input,select{padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--text);width:100%}
input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,110,99,.1)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.seg{display:flex;gap:8px;margin-bottom:16px}
.seg button{flex:1;padding:12px;border-radius:10px;font-weight:600;font-size:14.5px;border:1.5px solid var(--line);background:#fff;color:var(--muted)}
.seg button.on-in{background:var(--in-bg);border-color:var(--in);color:var(--in)}
.seg button.on-out{background:var(--out-bg);border-color:var(--out);color:var(--out)}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(22,33,43,.55);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;animation:up .22s ease}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
.mhead{padding:20px 22px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;border-radius:18px 18px 0 0}
.mhead h3{font-family:'Space Grotesk';font-size:17px;font-weight:600}
.mbody{padding:20px 22px}
.mfoot{padding:14px 22px 22px;display:flex;gap:10px}
.mfoot .btn{flex:1}
@media(min-width:640px){
  .overlay{align-items:center;padding:20px}
  .modal{border-radius:18px}
  .mhead{border-radius:18px 18px 0 0}
}

.empty{text-align:center;padding:38px 20px;color:var(--muted)}
.empty .e{font-size:32px;opacity:.35;margin-bottom:10px}
.empty p{font-size:14px;margin-bottom:14px}
.hint{background:#F7F9FA;border-left:3px solid var(--accent);padding:11px 14px;border-radius:0 8px 8px 0;font-size:13px;color:var(--muted);margin-top:14px}
.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,90px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;z-index:200;transition:.3s;box-shadow:0 8px 26px rgba(0,0,0,.25)}
.toast.show{transform:translate(-50%,0)}
@media(max-width:520px){
  .total .big{font-size:35px}
  .msum{grid-template-columns:1fr;}
  main{padding:16px}
}
</style>
</head>
<body>

<header>
  <div class="hwrap">
    <div class="htop">
      <div class="logo">Mi Dinero <span>· control simple</span></div>
      <button class="icon-btn" style="color:#93A7B5" onclick="menuDatos()" title="Datos">⋯</button>
    </div>
    <nav class="tabs" id="tabs">
      <button data-v="inicio" class="on">Inicio</button>
      <button data-v="historial">Historial</button>
      <button data-v="recurrentes">Recurrentes</button>
      <button data-v="billeteras">Billeteras</button>
    </nav>
  </div>
</header>

<main id="app"></main>
<div id="modal"></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════ DATOS ═══════════════ */
const KEY='mi_dinero_v1';
let memoria=null;

const store={
  get(){ try{ return localStorage.getItem(KEY); }catch(e){ return memoria; } },
  set(v){ try{ localStorage.setItem(KEY,v); }catch(e){ memoria=v; } }
};

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const hoy=()=>new Date().toISOString().slice(0,10);

const INICIAL={
  billeteras:[
    {id:'w1',nombre:'Efectivo',icono:'💵',saldoInicial:300},
    {id:'w2',nombre:'Yape',icono:'📱',saldoInicial:450},
    {id:'w3',nombre:'Plin',icono:'💬',saldoInicial:120},
    {id:'w4',nombre:'Cuenta de ahorros',icono:'🏦',saldoInicial:2500},
  ],
  movimientos:[
    {id:uid(),fecha:hoy(),tipo:'Ingreso',monto:2800,descripcion:'Sueldo',categoria:'Sueldo',billeteraId:'w4'},
    {id:uid(),fecha:hoy(),tipo:'Egreso',monto:65,descripcion:'Almuerzo',categoria:'Comida',billeteraId:'w2'},
    {id:uid(),fecha:hoy(),tipo:'Egreso',monto:120,descripcion:'Recibo de luz',categoria:'Servicios',billeteraId:'w4'},
  ],
  recurrentes:[
    {id:uid(),concepto:'Sueldo',tipo:'Ingreso',monto:2800,categoria:'Sueldo',billeteraId:'w4',frecuencia:'Mensual',proxima:sumarDias(hoy(),30),activo:true},
    {id:uid(),concepto:'Alquiler',tipo:'Egreso',monto:800,categoria:'Vivienda',billeteraId:'w4',frecuencia:'Mensual',proxima:sumarDias(hoy(),12),activo:true},
    {id:uid(),concepto:'Internet',tipo:'Egreso',monto:99,categoria:'Servicios',billeteraId:'w4',frecuencia:'Mensual',proxima:sumarDias(hoy(),6),activo:true},
  ],
};

function sumarDias(f,n){ const d=new Date(f+'T12:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

let DB;
function cargar(){
  const raw=store.get();
  try{ DB = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(INICIAL)); }
  catch(e){ DB = JSON.parse(JSON.stringify(INICIAL)); }
  DB.billeteras ||= []; DB.movimientos ||= []; DB.recurrentes ||= [];
}
function guardar(){ store.set(JSON.stringify(DB)); }

/* ═══════════════ CÁLCULOS ═══════════════ */
const S=n=>'S/ '+(+n||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const mesDe=f=>(f||'').slice(0,7);
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const nombreMes=ym=>{const[a,m]=ym.split('-');return MESES[+m-1]+' '+a;};
const fechaCorta=f=>{const[a,m,d]=f.split('-');return `${d} ${MESES[+m-1].slice(0,3)}`;};

const billetera=id=>DB.billeteras.find(b=>b.id===id);
function saldo(id){
  const b=billetera(id); if(!b) return 0;
  return DB.movimientos.reduce((t,m)=>{
    if(m.billeteraId!==id) return t;
    return t + (m.tipo==='Ingreso' ? +m.monto : -m.monto);
  }, +b.saldoInicial||0);
}
const saldoTotal=()=>DB.billeteras.reduce((t,b)=>t+saldo(b.id),0);
function totalesMes(ym){
  let ing=0,egr=0;
  for(const m of DB.movimientos){
    if(mesDe(m.fecha)!==ym) continue;
    if(m.tipo==='Ingreso') ing+=+m.monto; else egr+=+m.monto;
  }
  return {ing,egr,neto:ing-egr};
}
const mesActual=()=>hoy().slice(0,7);

/* ═══════════════ RECURRENTES ═══════════════ */
const PASOS={Semanal:{d:7},Quincenal:{d:15},Mensual:{m:1},Bimestral:{m:2},Trimestral:{m:3},Semestral:{m:6},Anual:{m:12}};
function siguienteFecha(f,frec){
  const p=PASOS[frec]||PASOS.Mensual;
  const d=new Date(f+'T12:00:00');
  if(p.d) d.setDate(d.getDate()+p.d);
  else { const dia=d.getDate(); d.setDate(1); d.setMonth(d.getMonth()+p.m);
         d.setDate(Math.min(dia,new Date(d.getFullYear(),d.getMonth()+1,0).getDate())); }
  return d.toISOString().slice(0,10);
}
function crearDesde(r,fecha){
  DB.movimientos.push({id:uid(),fecha,tipo:r.tipo,monto:+r.monto,descripcion:r.concepto,
    categoria:r.categoria,billeteraId:r.billeteraId,recurrenteId:r.id});
}
/* Automático: crea todo lo que ya venció hasta hoy */
function generarVencidos(){
  let n=0; const limite=hoy();
  for(const r of DB.recurrentes){
    if(!r.activo||!r.proxima) continue;
    let guard=0;
    while(r.proxima<=limite && guard++<200){
      crearDesde(r,r.proxima);
      r.proxima=siguienteFecha(r.proxima,r.frecuencia);
      n++;
    }
  }
  if(n) guardar();
  return n;
}
/* A pedido: adelanta N generaciones futuras */
function generarVeces(id,veces){
  const r=DB.recurrentes.find(x=>x.id===id);
  veces=Math.max(1,Math.min(60,+veces||1));
  for(let i=0;i<veces;i++){
    crearDesde(r,r.proxima);
    r.proxima=siguienteFecha(r.proxima,r.frecuencia);
  }
  pintar(); aviso(`${veces} ${veces===1?'movimiento generado':'movimientos generados'} de ${r.concepto}`);
}

/* ═══════════════ VISTAS ═══════════════ */
let vista='inicio';
let mesVisto=mesActual();
const app=()=>document.getElementById('app');

function pintar(){
  guardar();
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.v===vista));
  ({inicio:vInicio,historial:vHistorial,recurrentes:vRecurrentes,billeteras:vBilleteras})[vista]();
}
document.getElementById('tabs').onclick=e=>{
  const b=e.target.closest('button'); if(!b) return;
  vista=b.dataset.v; window.scrollTo(0,0); pintar();
};

/* ---------- INICIO ---------- */
function vInicio(){
  const t=totalesMes(mesActual());
  const ultimos=DB.movimientos.slice().sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id.localeCompare(a.id)).slice(0,6);
  app().innerHTML=`
    <div class="total">
      <div class="lbl">Tienes en total</div>
      <div class="big num">${S(saldoTotal())}</div>
      <div class="mini">
        <div>Este mes entró<b class="num">${S(t.ing)}</b></div>
        <div>Este mes salió<b class="num">${S(t.egr)}</b></div>
        <div>Diferencia<b class="num">${t.neto>=0?'+':''}${S(t.neto)}</b></div>
      </div>
    </div>

    <div class="quick">
      <button class="btn btn-in" onclick="formMov(null,'Ingreso')">＋ Ingreso</button>
      <button class="btn btn-out" onclick="formMov(null,'Egreso')">－ Egreso</button>
    </div>

    <h2>Mis billeteras</h2>
    <div class="grid wallets mb">
      ${DB.billeteras.map(b=>tarjetaBilletera(b)).join('')}
      <button class="add-wallet" onclick="formBilletera()"><span style="font-size:20px">＋</span>Agregar billetera</button>
    </div>

    <div class="card pad">
      <div class="between" style="margin-bottom:10px">
        <h2 style="margin:0">Últimos movimientos</h2>
        ${DB.movimientos.length?`<button class="btn btn-line btn-sm" onclick="irA('historial')">Ver todo</button>`:''}
      </div>
      ${ultimos.length ? ultimos.map(m=>filaMov(m)).join('')
        : `<div class="empty"><div class="e">📋</div><p>Aún no registras nada.<br>Usa los botones de arriba.</p></div>`}
    </div>`;
}
function tarjetaBilletera(b){
  const s=saldo(b.id);
  return `<div class="wallet">
    <div class="top">
      <div class="emoji">${b.icono||'💼'}</div>
      <div class="nm">${esc(b.nombre)}</div>
      <button class="icon-btn" onclick="formBilletera('${b.id}')">✎</button>
    </div>
    <div class="amt num ${s<0?'neg':''}">${S(s)}</div>
    <div class="sub">${DB.movimientos.filter(m=>m.billeteraId===b.id).length} movimientos</div>
  </div>`;
}
function filaMov(m){
  const b=billetera(m.billeteraId);
  const ing=m.tipo==='Ingreso';
  return `<div class="mov">
    <div class="ic ${ing?'i':'e'}">${ing?'↓':'↑'}</div>
    <div class="info">
      <div class="d">${esc(m.descripcion||m.categoria||'Sin descripción')}${m.recurrenteId?'<span class="chip">↻ auto</span>':''}</div>
      <div class="m">${fechaCorta(m.fecha)} · ${b?esc(b.icono+' '+b.nombre):'—'}${m.categoria?' · '+esc(m.categoria):''}</div>
    </div>
    <div class="val ${ing?'pos':'neg'}">${ing?'+':'−'}${S(m.monto)}</div>
    <div class="acts">
      <button class="icon-btn" onclick="formMov('${m.id}')">✎</button>
      <button class="icon-btn" onclick="borrarMov('${m.id}')">✕</button>
    </div>
  </div>`;
}

/* ---------- HISTORIAL ---------- */
function vHistorial(){
  const t=totalesMes(mesVisto);
  const lista=DB.movimientos.filter(m=>mesDe(m.fecha)===mesVisto)
    .sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id.localeCompare(a.id));
  app().innerHTML=`
    <div class="monthbar">
      <button class="nav-m" onclick="moverMes(-1)">‹</button>
      <div class="mname">${nombreMes(mesVisto)}</div>
      <button class="nav-m" onclick="moverMes(1)">›</button>
    </div>
    <div class="msum">
      <div><div class="l">Entró</div><div class="v pos num">${S(t.ing)}</div></div>
      <div><div class="l">Salió</div><div class="v neg num">${S(t.egr)}</div></div>
      <div><div class="l">Diferencia</div><div class="v num" style="color:${t.neto>=0?'var(--in)':'var(--out)'}">${t.neto>=0?'+':''}${S(t.neto)}</div></div>
    </div>
    <div class="card pad">
      <div class="between" style="margin-bottom:10px">
        <h2 style="margin:0">${lista.length} movimiento${lista.length===1?'':'s'}</h2>
        <button class="btn btn-line btn-sm" onclick="formMov()">＋ Agregar</button>
      </div>
      ${lista.length ? lista.map(m=>filaMov(m)).join('')
        : `<div class="empty"><div class="e">📅</div><p>No hay movimientos en ${nombreMes(mesVisto)}.</p>
           <button class="btn btn-dark btn-sm" onclick="formMov()">Registrar uno</button></div>`}
    </div>`;
}
function moverMes(n){
  let [a,m]=mesVisto.split('-').map(Number);
  m+=n; if(m<1){m=12;a--;} if(m>12){m=1;a++;}
  mesVisto=`${a}-${String(m).padStart(2,'0')}`; pintar();
}

/* ---------- RECURRENTES ---------- */
function vRecurrentes(){
  app().innerHTML=`
    <div class="card pad mb">
      <div class="between" style="margin-bottom:4px">
        <h2 style="margin:0">Ingresos y egresos que se repiten</h2>
        <button class="btn btn-dark btn-sm" onclick="formRecurrente()">＋ Nuevo</button>
      </div>
      <div class="hint">Cada uno se registra solo cuando llega su fecha. Si quieres adelantarte, escribe cuántas veces y pulsa <b>Generar</b>.</div>
    </div>
    <div class="card pad">
      ${DB.recurrentes.length ? DB.recurrentes.map(r=>filaRec(r)).join('')
        : `<div class="empty"><div class="e">🔁</div><p>Sin recurrentes.<br>Agrega tu sueldo, alquiler o recibos.</p>
           <button class="btn btn-dark btn-sm" onclick="formRecurrente()">Crear el primero</button></div>`}
    </div>`;
}
function filaRec(r){
  const b=billetera(r.billeteraId);
  const ing=r.tipo==='Ingreso';
  const dias=Math.ceil((new Date(r.proxima+'T12:00:00')-new Date(hoy()+'T12:00:00'))/86400000);
  const cuando = !r.activo ? 'Pausado' : dias<=0?'Se registra hoy' : dias===1?'Mañana' : `En ${dias} días`;
  return `<div class="rec ${r.activo?'':'pausado'}">
    <div class="ic mov-ic" style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;background:${ing?'var(--in-bg)':'var(--out-bg)'};color:${ing?'var(--in)':'var(--out)'}">${ing?'↓':'↑'}</div>
    <div class="info">
      <div class="d">${esc(r.concepto)}</div>
      <div class="m">${r.frecuencia} · ${b?esc(b.nombre):'—'} · ${cuando} (${fechaCorta(r.proxima)})</div>
    </div>
    <div class="val num ${ing?'pos':'neg'}" style="font-family:'Space Grotesk';font-weight:600">${ing?'+':'−'}${S(r.monto)}</div>
    <div class="gen">
      <input type="number" min="1" max="60" value="1" id="g_${r.id}">
      <button class="btn btn-line btn-sm" onclick="generarVeces('${r.id}',document.getElementById('g_${r.id}').value)">Generar</button>
      <button class="icon-btn" onclick="pausarRec('${r.id}')" title="${r.activo?'Pausar':'Activar'}">${r.activo?'⏸':'▶'}</button>
      <button class="icon-btn" onclick="formRecurrente('${r.id}')">✎</button>
      <button class="icon-btn" onclick="borrarRec('${r.id}')">✕</button>
    </div>
  </div>`;
}
function pausarRec(id){const r=DB.recurrentes.find(x=>x.id===id);r.activo=!r.activo;pintar();aviso(r.activo?'Activado':'Pausado');}
function borrarRec(id){
  if(!confirm('¿Eliminar este recurrente? Los movimientos ya registrados se mantienen.')) return;
  DB.recurrentes=DB.recurrentes.filter(x=>x.id!==id); pintar(); aviso('Recurrente eliminado');
}

/* ---------- BILLETERAS ---------- */
function vBilleteras(){
  app().innerHTML=`
    <div class="card pad mb">
      <div class="between">
        <h2 style="margin:0">Mis billeteras</h2>
        <button class="btn btn-dark btn-sm" onclick="formBilletera()">＋ Nueva</button>
      </div>
      <div class="hint">El <b>saldo inicial</b> es el dinero que ya tenías cuando empezaste a usar esto. De ahí en adelante suma y resta según tus movimientos.</div>
    </div>
    <div class="grid wallets">
      ${DB.billeteras.map(b=>{
        const s=saldo(b.id);
        return `<div class="wallet">
          <div class="top">
            <div class="emoji">${b.icono||'💼'}</div>
            <div class="nm">${esc(b.nombre)}</div>
          </div>
          <div class="amt num ${s<0?'neg':''}">${S(s)}</div>
          <div class="sub">Inicial ${S(b.saldoInicial)}</div>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn btn-line btn-sm" style="flex:1" onclick="formBilletera('${b.id}')">Editar</button>
            <button class="btn btn-line btn-sm" onclick="borrarBilletera('${b.id}')">✕</button>
          </div>
        </div>`}).join('')}
      <button class="add-wallet" onclick="formBilletera()"><span style="font-size:20px">＋</span>Agregar billetera</button>
    </div>`;
}
function borrarBilletera(id){
  const n=DB.movimientos.filter(m=>m.billeteraId===id).length;
  if(n && !confirm(`Esta billetera tiene ${n} movimientos. Si la eliminas, también se eliminan. ¿Continuar?`)) return;
  if(!n && !confirm('¿Eliminar esta billetera?')) return;
  DB.movimientos=DB.movimientos.filter(m=>m.billeteraId!==id);
  DB.recurrentes=DB.recurrentes.filter(r=>r.billeteraId!==id);
  DB.billeteras=DB.billeteras.filter(b=>b.id!==id);
  pintar(); aviso('Billetera eliminada');
}

/* ═══════════════ FORMULARIOS ═══════════════ */
let tipoSel='Egreso';
const CATEGORIAS=['Sueldo','Negocio','Venta','Comida','Transporte','Servicios','Vivienda','Salud','Educación','Compras','Ocio','Otros'];

function formMov(id,tipo){
  const m = id ? DB.movimientos.find(x=>x.id===id) : null;
  tipoSel = m ? m.tipo : (tipo||'Egreso');
  if(!DB.billeteras.length){ aviso('Primero crea una billetera'); return formBilletera(); }
  abrir(id?'Editar movimiento':'Nuevo movimiento',`
    <div class="seg">
      <button id="sIng" onclick="setTipo('Ingreso')">↓ Ingreso</button>
      <button id="sEgr" onclick="setTipo('Egreso')">↑ Egreso</button>
    </div>
    <div class="field">
      <label>¿Cuánto?</label>
      <input id="f_monto" type="number" step="0.01" inputmode="decimal" value="${m?m.monto:''}" placeholder="0.00" autofocus>
    </div>
    <div class="field">
      <label>¿En qué billetera?</label>
      <select id="f_bill">${DB.billeteras.map(b=>`<option value="${b.id}" ${m&&m.billeteraId===b.id?'selected':''}>${b.icono} ${esc(b.nombre)}</option>`).join('')}</select>
    </div>
    <div class="field">
      <label>¿Qué fue?</label>
      <input id="f_desc" value="${m?esc(m.descripcion):''}" placeholder="Ej. Almuerzo, recibo de luz">
    </div>
    <div class="two">
      <div class="field">
        <label>Categoría</label>
        <input id="f_cat" list="cats" value="${m?esc(m.categoria):''}" placeholder="Comida">
        <datalist id="cats">${CATEGORIAS.map(c=>`<option value="${c}">`).join('')}</datalist>
      </div>
      <div class="field">
        <label>Fecha</label>
        <input id="f_fecha" type="date" value="${m?m.fecha:hoy()}">
      </div>
    </div>`,
    ()=>{
      const monto=+val('f_monto');
      if(!monto||monto<=0){ aviso('Escribe un monto'); return false; }
      const d={fecha:val('f_fecha')||hoy(),tipo:tipoSel,monto,descripcion:val('f_desc'),
               categoria:val('f_cat'),billeteraId:val('f_bill')};
      if(id) Object.assign(DB.movimientos.find(x=>x.id===id),d);
      else DB.movimientos.push({id:uid(),...d});
      pintar(); aviso(id?'Movimiento actualizado':(tipoSel==='Ingreso'?'Ingreso registrado':'Egreso registrado'));
      return true;
    });
  setTipo(tipoSel);
}
function setTipo(t){
  tipoSel=t;
  const i=document.getElementById('sIng'), e=document.getElementById('sEgr');
  if(!i) return;
  i.className = t==='Ingreso'?'on-in':''; e.className = t==='Egreso'?'on-out':'';
}
function borrarMov(id){
  if(!confirm('¿Eliminar este movimiento?')) return;
  DB.movimientos=DB.movimientos.filter(x=>x.id!==id); pintar(); aviso('Movimiento eliminado');
}

function formBilletera(id){
  const b = id ? DB.billeteras.find(x=>x.id===id) : null;
  const iconos=['💵','📱','💬','🏦','💳','🐷','👛','💰','🏧','📦'];
  abrir(id?'Editar billetera':'Nueva billetera',`
    <div class="field">
      <label>Nombre</label>
      <input id="b_nom" value="${b?esc(b.nombre):''}" placeholder="Ej. Yape, Efectivo, BCP" autofocus>
    </div>
    <div class="field">
      <label>Ícono</label>
      <div style="display:flex;gap:7px;flex-wrap:wrap" id="iconos">
        ${iconos.map(i=>`<button type="button" onclick="pickIcono('${i}')" data-i="${i}"
          style="width:42px;height:42px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-size:19px">${i}</button>`).join('')}
      </div>
      <input type="hidden" id="b_ico" value="${b?b.icono:'💼'}">
    </div>
    <div class="field">
      <label>Saldo inicial <span style="color:var(--muted);font-weight:400">— lo que ya tienes ahí</span></label>
      <input id="b_saldo" type="number" step="0.01" inputmode="decimal" value="${b?b.saldoInicial:0}">
    </div>`,
    ()=>{
      const nom=val('b_nom').trim();
      if(!nom){ aviso('Ponle un nombre'); return false; }
      const d={nombre:nom,icono:val('b_ico')||'💼',saldoInicial:+val('b_saldo')||0};
      if(id) Object.assign(DB.billeteras.find(x=>x.id===id),d);
      else DB.billeteras.push({id:uid(),...d});
      pintar(); aviso(id?'Billetera actualizada':'Billetera creada');
      return true;
    });
  pickIcono(b?b.icono:'💼');
}
function pickIcono(i){
  const h=document.getElementById('b_ico'); if(!h) return;
  h.value=i;
  document.querySelectorAll('#iconos button').forEach(btn=>{
    const on=btn.dataset.i===i;
    btn.style.borderColor = on?'var(--accent)':'var(--line)';
    btn.style.background  = on?'#E9F2F1':'#fff';
  });
}

function formRecurrente(id){
  const r = id ? DB.recurrentes.find(x=>x.id===id) : null;
  if(!DB.billeteras.length){ aviso('Primero crea una billetera'); return formBilletera(); }
  abrir(id?'Editar recurrente':'Nuevo recurrente',`
    <div class="field">
      <label>¿Qué es?</label>
      <input id="r_con" value="${r?esc(r.concepto):''}" placeholder="Ej. Sueldo, alquiler, Netflix" autofocus>
    </div>
    <div class="two">
      <div class="field">
        <label>Tipo</label>
        <select id="r_tipo"><option ${r&&r.tipo==='Ingreso'?'selected':''}>Ingreso</option><option ${!r||r.tipo==='Egreso'?'selected':''}>Egreso</option></select>
      </div>
      <div class="field">
        <label>Monto</label>
        <input id="r_monto" type="number" step="0.01" inputmode="decimal" value="${r?r.monto:''}" placeholder="0.00">
      </div>
    </div>
    <div class="field">
      <label>Billetera</label>
      <select id="r_bill">${DB.billeteras.map(b=>`<option value="${b.id}" ${r&&r.billeteraId===b.id?'selected':''}>${b.icono} ${esc(b.nombre)}</option>`).join('')}</select>
    </div>
    <div class="two">
      <div class="field">
        <label>¿Cada cuánto?</label>
        <select id="r_frec">${Object.keys(PASOS).map(f=>`<option ${r&&r.frecuencia===f?'selected':(!r&&f==='Mensual'?'selected':'')}>${f}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>Próxima fecha</label>
        <input id="r_prox" type="date" value="${r?r.proxima:hoy()}">
      </div>
    </div>
    <div class="field">
      <label>Categoría</label>
      <input id="r_cat" list="cats2" value="${r?esc(r.categoria):''}" placeholder="Servicios">
      <datalist id="cats2">${CATEGORIAS.map(c=>`<option value="${c}">`).join('')}</datalist>
    </div>
    <div class="hint">Llegada esa fecha se registra solo. Después salta a la siguiente según la frecuencia.</div>`,
    ()=>{
      const con=val('r_con').trim(), monto=+val('r_monto');
      if(!con){ aviso('Ponle un nombre'); return false; }
      if(!monto||monto<=0){ aviso('Escribe un monto'); return false; }
      const d={concepto:con,tipo:val('r_tipo'),monto,categoria:val('r_cat'),billeteraId:val('r_bill'),
               frecuencia:val('r_frec'),proxima:val('r_prox')||hoy(),activo:r?r.activo:true};
      if(id) Object.assign(DB.recurrentes.find(x=>x.id===id),d);
      else DB.recurrentes.push({id:uid(),...d});
      pintar(); aviso(id?'Recurrente actualizado':'Recurrente creado');
      return true;
    });
}

/* ═══════════════ UI ═══════════════ */
const val=id=>document.getElementById(id)?.value ?? '';
let alGuardar=null;
function abrir(titulo,cuerpo,onSave){
  alGuardar=onSave;
  document.getElementById('modal').innerHTML=`
    <div class="overlay" onclick="if(event.target===this)cerrar()">
      <div class="modal">
        <div class="mhead"><h3>${titulo}</h3><button class="icon-btn" onclick="cerrar()">✕</button></div>
        <div class="mbody">${cuerpo}</div>
        <div class="mfoot">
          <button class="btn btn-line" onclick="cerrar()">Cancelar</button>
          <button class="btn btn-dark" onclick="confirmar()">Guardar</button>
        </div>
      </div>
    </div>`;
  setTimeout(()=>document.querySelector('.mbody input')?.focus(),80);
}
function cerrar(){ document.getElementById('modal').innerHTML=''; alGuardar=null; }
function confirmar(){ if(!alGuardar) return cerrar(); if(alGuardar()!==false) cerrar(); }
function irA(v){ vista=v; window.scrollTo(0,0); pintar(); }

let tT;
function aviso(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2400);
}
function menuDatos(){
  abrir('Mis datos',`
    <p style="font-size:14px;color:var(--muted);margin-bottom:16px">
      Todo se guarda en este navegador, en tu equipo. Nadie más lo ve.</p>
    <button class="btn btn-line" style="width:100%;margin-bottom:10px" onclick="exportar()">⬇ Descargar copia (CSV)</button>
    <button class="btn btn-line" style="width:100%;color:var(--out)" onclick="reiniciar()">↺ Borrar todo y empezar de cero</button>`,
    ()=>true);
}
function exportar(){
  const filas=[['Fecha','Tipo','Descripcion','Categoria','Billetera','Monto']];
  DB.movimientos.slice().sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(m=>{
    const b=billetera(m.billeteraId);
    filas.push([m.fecha,m.tipo,m.descripcion||'',m.categoria||'',b?b.nombre:'',(+m.monto).toFixed(2)]);
  });
  const csv=filas.map(f=>f.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='mis-movimientos.csv'; a.click();
  cerrar(); aviso('Copia descargada');
}
function reiniciar(){
  if(!confirm('Se borrarán todas tus billeteras y movimientos. ¿Seguro?')) return;
  DB=JSON.parse(JSON.stringify(INICIAL)); cerrar(); pintar(); aviso('Todo reiniciado');
}

/* ═══════════════ INICIO ═══════════════ */
cargar();
const generados=generarVencidos();
pintar();
if(generados) setTimeout(()=>aviso(`${generados} movimiento${generados===1?'':'s'} recurrente${generados===1?'':'s'} registrado${generados===1?'':'s'}`),600);
</script>
</body>
</html>
