<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Financiero · ACIF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#2C3E50; --slate:#34495E; --dark:#1A252F; --ink:#1B2631; --muted:#7B8794;
  --line:#E4E8EC; --bg:#F4F6F8; --card:#FFFFFF; --cardline:#EDF0F3;
  --green:#1E8449; --green-bg:#E8F6EF; --red:#C0392B; --red-bg:#FDECEA;
  --amber:#B9770E; --amber-bg:#FCF3E3; --gold:#C9A227; --blue:#2471A3;
  --shadow:0 1px 2px rgba(20,30,45,.06),0 8px 24px rgba(20,30,45,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:14px}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.side{width:236px;background:var(--navy);color:#DDE4EA;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:20}
.brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand h1{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:#fff;letter-spacing:.2px}
.brand span{font-size:11px;color:#8FA0AF;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.nav{padding:12px 12px;flex:1;overflow-y:auto}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;color:#B7C4CF;font-weight:500;font-size:13.5px;margin-bottom:2px;transition:.15s;text-decoration:none}
.nav a .ic{width:17px;text-align:center;opacity:.85}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:var(--gold);color:var(--dark);font-weight:700}
.nav a.active .ic{opacity:1}
.side-foot{padding:14px 18px;font-size:11px;color:#7A8895;border-top:1px solid rgba(255,255,255,.08)}
.side-foot b{color:#AEB9C4}

/* MAIN */
.main{margin-left:236px;flex:1;min-width:0}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:16px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h2{font-size:17px;font-weight:700;color:var(--navy)}
.topbar .sub{font-size:12px;color:var(--muted);margin-top:1px}
.content{padding:26px 30px 60px;max-width:1240px}
.hidden{display:none!important}

/* CARDS */
.grid{display:grid;gap:16px}
.card{background:var(--card);border:1px solid var(--cardline);border-radius:14px;box-shadow:var(--shadow)}
.card-pad{padding:20px 22px}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;margin-bottom:14px}

/* KPI */
.kpis{grid-template-columns:repeat(4,1fr)}
.kpi{padding:18px 20px}
.kpi .lab{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}
.kpi .val{font-family:'Fraunces',serif;font-size:27px;font-weight:600;margin-top:7px;letter-spacing:-.3px}
.kpi .val.big{font-size:30px}
.kpi .meta{font-size:12px;color:var(--muted);margin-top:4px}
.pos{color:var(--green)} .neg{color:var(--red)} .amb{color:var(--amber)}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.pill.g{background:var(--green-bg);color:var(--green)} .pill.r{background:var(--red-bg);color:var(--red)} .pill.a{background:var(--amber-bg);color:var(--amber)}

/* TABLES */
table{width:100%;border-collapse:collapse}
th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;text-align:left;padding:9px 12px;border-bottom:1.5px solid var(--line)}
td{padding:10px 12px;border-bottom:1px solid var(--cardline);font-size:13px}
tbody tr:hover{background:#FAFBFC}
th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.tag.ing{background:var(--green-bg);color:var(--green)} .tag.egr{background:var(--red-bg);color:var(--red)}
.tag.tra{background:#EAF2F8;color:var(--blue)} .tag.inv{background:#F4ECFB;color:#7D3C98}
.tag.prog{background:#FEF5E7;color:var(--amber)} .tag.ejec{background:#EAF2EC;color:#4A6B54}
.wallet-chip{display:inline-flex;align-items:center;gap:6px}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 18px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:var(--slate)}
input,select{padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);transition:.15s}
input:focus,select:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(44,62,80,.08)}
.btn{padding:10px 18px;border-radius:9px;font-weight:700;font-size:13.5px;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn.primary{background:var(--navy);color:#fff}
.btn.primary:hover{background:var(--dark)}
.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--slate)}
.btn.ghost:hover{border-color:var(--navy);color:var(--navy)}
.btn.gold{background:var(--gold);color:var(--dark)}
.btn.sm{padding:6px 12px;font-size:12px}
.btn.danger{color:var(--red)} .btn.danger:hover{background:var(--red-bg)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}
.icon-btn:hover{background:var(--bg);color:var(--navy)}

/* SALDO BARS */
.saldo-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--cardline)}
.saldo-row:last-child{border:none}
.saldo-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--bg);flex-shrink:0}
.saldo-name{flex:1;min-width:0}
.saldo-name .n{font-weight:600;font-size:13px}
.saldo-name .t{font-size:11px;color:var(--muted)}
.saldo-val{font-weight:700;font-variant-numeric:tabular-nums;font-size:14px}

/* PROGRESS */
.prog-wrap{height:10px;background:var(--line);border-radius:20px;overflow:hidden;margin-top:8px}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--green),#27AE60);border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* SIM */
.sim-out{margin-top:14px;padding:14px 16px;border-radius:11px;font-weight:600;font-size:13.5px;line-height:1.4}
.sim-out.ok{background:var(--green-bg);color:var(--green)}
.sim-out.warn{background:var(--amber-bg);color:var(--amber)}
.sim-out.bad{background:var(--red-bg);color:var(--red)}

/* PROJECTION */
.proj-scroll{overflow-x:auto}
.proj table{min-width:900px}
.proj td.cat{font-weight:500;white-space:nowrap}
.proj tr.head td{background:#F0F2F5;font-weight:700;color:var(--navy)}
.proj tr.tot td{background:var(--slate);color:#fff;font-weight:700}
.proj tr.acc td{background:var(--dark);color:#fff;font-weight:700}
.proj td.num{font-variant-numeric:tabular-nums}
.proj td.zero{color:transparent}

/* TABS in config */
.subtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;border-bottom:1px solid var(--line)}
.subtabs button{padding:9px 15px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1px}
.subtabs button.active{color:var(--navy);border-color:var(--gold)}
.section-title{font-size:15px;font-weight:700;color:var(--navy);margin:0 0 4px}
.section-sub{font-size:12.5px;color:var(--muted);margin-bottom:16px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(26,37,47,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:16px;font-weight:700;color:var(--navy);text-transform:none;letter-spacing:0;margin:0}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .big{font-size:34px;margin-bottom:10px;opacity:.5}
.mono{font-variant-numeric:tabular-nums}
.toast{position:fixed;bottom:26px;right:26px;background:var(--dark);color:#fff;padding:13px 20px;border-radius:11px;font-weight:600;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;transform:translateY(80px);opacity:0;transition:.35s}
.toast.show{transform:translateY(0);opacity:1}

.menu-toggle{display:none}
@media(max-width:900px){
  .side{transform:translateX(-100%);transition:.3s;width:250px}
  .side.open{transform:translateX(0)}
  .main{margin-left:0}
  .menu-toggle{display:inline-flex}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  .content{padding:18px 16px 60px}
  .topbar{padding:14px 16px}
  .two-col{grid-template-columns:1fr!important}
}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="side" id="side">
    <div class="brand">
      <span>Finanzas Personales</span>
      <h1>ACIF Cashflow</h1>
    </div>
    <nav class="nav" id="nav">
      <a data-view="dashboard" class="active"><span class="ic">◈</span> Dashboard</a>
      <a data-view="movimientos"><span class="ic">↹</span> Movimientos</a>
      <a data-view="proyeccion"><span class="ic">↗</span> Proyección 12M</a>
      <a data-view="deudas"><span class="ic">▤</span> Deudas y Tarjetas</a>
      <a data-view="inversiones"><span class="ic">◆</span> Inversiones</a>
      <a data-view="config"><span class="ic">⚙</span> Configuración</a>
    </nav>
    <div class="side-foot">
      Presupuesto Base Cero<br>Flujo de caja proyectado · <b>12M</b>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="icon-btn menu-toggle" onclick="document.getElementById('side').classList.toggle('open')" style="font-size:20px">☰</button>
        <div>
          <h2 id="viewTitle">Dashboard financiero</h2>
          <div class="sub" id="viewSub">Patrimonio, liquidez e indicadores clave</div>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn ghost sm" onclick="exportCSV()">⬇ CSV</button>
        <button class="btn primary sm" onclick="openMov()">+ Movimiento</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>

const fmt = (n,dec=2)=> (n<0?'-':'')+'S/ '+Math.abs(+n||0).toLocaleString('es-PE',{minimumFractionDigits:dec,maximumFractionDigits:dec});
const pct = n => ((+n||0)*100).toFixed(1)+'%';
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const mesKey = f => (f||'').slice(0,7);
const nombreMes = ym => { const [y,m]=ym.split('-'); return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m-1]+' '+y.slice(2); };

    {id:uid(),nombre:'Restaurantes / Delivery',grupo:'Egreso',clase:'Deseo'},
    {id:uid(),nombre:'Compras / Ropa',grupo:'Egreso',clase:'Deseo'},
    {id:uid(),nombre:'Suscripciones',grupo:'Egreso',clase:'Deseo'},
    {id:uid(),nombre:'Viajes',grupo:'Egreso',clase:'Deseo'},
    {id:uid(),nombre:'Ocio / Entretenimiento',grupo:'Egreso',clase:'Deseo'},
    {id:uid(),nombre:'Provisión Anual',grupo:'Egreso',clase:'Necesidad'},
    {id:uid(),nombre:'Aporte Inversión',grupo:'Inversión',clase:'Activo'},
    {id:uid(),nombre:'Transferencia interna',grupo:'Transferencia',clase:'—'},
    {id:uid(),nombre:'Otros Egresos',grupo:'Egreso',clase:'Deseo'},

  tiposMov:['Ingreso','Egreso','Transferencia','Inversión'],
  tiposGasto:['Costo Fijo / Necesidad','Costo Variable / Deseo','Deuda / Pasivo','Ahorro / Inversión'],
  medios:['Efectivo','Yape','Plin','Tarjeta Débito','Tarjeta Crédito','Transferencia','Débito automático'],
  estados:['Ejecutado','Programado'],
  divisas:[
    {id:uid(),cod:'PEN',nombre:'Sol Peruano',tc:1},
    {id:uid(),cod:'USD',nombre:'Dólar EEUU',tc:3.75},
    {id:uid(),cod:'EUR',nombre:'Euro',tc:4.05},
    {id:uid(),cod:'CLP',nombre:'Peso Chileno',tc:0.0040},
  ],
  tarjetas:[
    {id:uid(),nombre:'Tarjeta BCP Visa',banco:'BCP',linea:6000,cierre:25,pago:15,tasa:0.65,moneda:'PEN'},
    {id:uid(),nombre:'Tarjeta Interbank MC',banco:'Interbank',linea:4500,cierre:5,pago:20,tasa:0.72,moneda:'PEN'},
  ],
  prestamos:[
    {id:uid(),nombre:'Crédito Vehicular',entidad:'BBVA',monto:28000,tasa:0.145,cuotas:36,inicio:'2025-09-01'},
    {id:uid(),nombre:'Préstamo Personal',entidad:'Interbank',monto:9000,tasa:0.28,cuotas:18,inicio:'2026-01-15'},
  ],
  inversiones:[
    {id:uid(),nombre:'Fondo Mutuo BCP',invertido:5000,valorActual:5420,rendimiento:180},
    {id:uid(),nombre:'Depósito a Plazo IBK',invertido:8000,valorActual:8360,rendimiento:0},
    {id:uid(),nombre:'Acciones BVL',invertido:3000,valorActual:2740,rendimiento:60},
  ],
  provisiones:[
    {id:uid(),concepto:'Seguro Vehicular',anual:1400,meses:8},
    {id:uid(),concepto:'Impuesto Predial',anual:600,meses:5},
    {id:uid(),concepto:'Matrícula anual',anual:2400,meses:4},
  ],
  movimientos:[
    m('2026-01-02','Sueldo enero','Ingreso','Sueldo','Interbank Sueldo','','Transferencia','PEN',4200,'Ejecutado'),
    m('2026-01-03','Alquiler depto','Egreso','Vivienda / Alquiler','Interbank Sueldo','','Transferencia','PEN',1300,'Ejecutado'),
    m('2026-01-05','Compras supermercado','Egreso','Alimentación','Yape','','Yape','PEN',520,'Ejecutado'),
    m('2026-01-07','Combustible','Egreso','Transporte','Tarjeta BCP Visa','','Tarjeta Crédito','PEN',180,'Ejecutado'),
    m('2026-01-10','Internet + cable','Egreso','Servicios (luz, agua, internet)','BCP Ahorros','','Débito automático','PEN',149,'Ejecutado'),
    m('2026-01-12','Cena restaurante','Egreso','Restaurantes / Delivery','Tarjeta BCP Visa','','Tarjeta Crédito','PEN',145,'Ejecutado'),
    m('2026-01-15','Aporte fondo mutuo','Inversión','Aporte Inversión','BCP Ahorros','','Transferencia','PEN',600,'Ejecutado'),
    m('2026-01-18','Freelance diseño','Ingreso','Ingreso Freelance','Yape','','Yape','PEN',850,'Ejecutado'),
    m('2026-01-20','Suscripción software','Egreso','Suscripciones','Tarjeta Interbank MC','','Tarjeta Crédito','USD',29,'Ejecutado'),
    m('2026-01-25','Pago tarjeta BCP','Transferencia','Pago Tarjeta / Deuda','BCP Ahorros','Tarjeta BCP Visa','Transferencia','PEN',470,'Ejecutado'),

    m('2026-02-14','Regalo','Egreso','Compras / Ropa','Tarjeta BCP Visa','','Tarjeta Crédito','PEN',220,'Ejecutado'),
    m('2026-02-28','Bono trimestral','Ingreso','Bono / Comisión','Interbank Sueldo','','Transferencia','PEN',1500,'Ejecutado'),
    m('2026-03-02','Sueldo marzo','Ingreso','Sueldo','Interbank Sueldo','','Transferencia','PEN',4200,'Programado'),
    m('2026-03-03','Alquiler depto','Egreso','Vivienda / Alquiler','Interbank Sueldo','','Transferencia','PEN',1300,'Programado'),
    m('2026-03-10','Matrícula curso','Egreso','Educación','BCP Ahorros','','Transferencia','PEN',480,'Programado'),
    m('2026-04-02','Sueldo abril','Ingreso','Sueldo','Interbank Sueldo','','Transferencia','PEN',4200,'Programado'),
    m('2026-04-15','Viaje feriado','Egreso','Viajes','Fondo Emergencia','','Transferencia','PEN',1200,'Programado'),
    m('2026-06-02','Sueldo junio','Ingreso','Sueldo','Interbank Sueldo','','Transferencia','PEN',4200,'Programado'),
    m('2026-06-20','Seguro auto (anual)','Egreso','Provisión Anual','BCP Ahorros','','Transferencia','PEN',1400,'Programado'),
  ],
  fondoMesesMeta:6,
  projStart:'2026-01',
};
function m(fecha,desc,tipo,cat,orig,dest,medio,mon,monto,est){
  return {id:uid(),fecha,desc,tipo,categoria:cat,ctaOrigen:orig,ctaDestino:dest,medio,moneda:mon,monto,estado:est};
}

let DB;
function load(){
  try{ const raw=localStorage.getItem(LS_KEY); DB = raw?JSON.parse(raw):structuredClone(DEFAULTS); }
  catch(e){ DB=structuredClone(DEFAULTS); }
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }catch(e){} }
function resetDB(){ if(confirm('¿Restaurar los datos de ejemplo? Se perderán tus cambios.')){ DB=structuredClone(DEFAULTS); save(); render(); toast('Datos restaurados'); } }

/* ============================ CÁLCULOS ============================ */
const tc = cod => { const d=DB.divisas.find(x=>x.cod===cod); return d?d.tc:1; };
const base = mv => (+mv.monto||0)*tc(mv.moneda);
const ejec = mv => mv.estado==='Ejecutado';

function saldoCartera(nombre, soloEjecutado=true){
  const c=DB.carteras.find(x=>x.nombre===nombre); if(!c) return 0;
  let s=+c.saldoInicial||0;
  for(const mv of DB.movimientos){
    if(soloEjecutado && !ejec(mv)) continue;
    if(mv.ctaOrigen===nombre){
      if(mv.tipo==='Ingreso') s+=base(mv);
      else if(mv.tipo==='Egreso'||mv.tipo==='Inversión'||mv.tipo==='Transferencia') s-=base(mv);
    }
    if(mv.ctaDestino===nombre && mv.tipo==='Transferencia') s+=base(mv);
  }
  return s;
}
const totalLiquido = ()=> DB.carteras.reduce((a,c)=>a+saldoCartera(c.nombre),0);

function consumoTarjeta(nombre){
  let s=0;
  for(const mv of DB.movimientos){ if(!ejec(mv)) continue;
    if(mv.ctaOrigen===nombre && mv.tipo==='Egreso') s+=base(mv);
    if(mv.ctaDestino===nombre && mv.tipo==='Transferencia') s-=base(mv);
  }
  return s;
}
const deudaTarjetas = ()=> DB.tarjetas.reduce((a,t)=>a+Math.max(0,consumoTarjeta(t.nombre)),0);

function saldoPrestamo(p){
  const i=(+p.tasa)/12, n=+p.cuotas;
  const cuota = i>0 ? p.monto*i/(1-Math.pow(1+i,-n)) : p.monto/n;
  const meses = mesesTranscurridos(p.inicio);
  const rest = Math.max(0, n-Math.min(n,meses));
  const saldo = i>0 ? cuota*(1-Math.pow(1+i,-rest))/i : cuota*rest;
  return {cuota,pagadas:Math.min(n,meses),rest,saldo};
}
function mesesTranscurridos(fecha){
  if(!fecha) return 0;
  const d=new Date(fecha), now=new Date();
  return Math.max(0,(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth()));
}
const saldoPrestamos = ()=> DB.prestamos.reduce((a,p)=>a+saldoPrestamo(p).saldo,0);

function sumaMov(tipo, estado){
  return DB.movimientos.filter(x=>x.tipo===tipo && (!estado||x.estado===estado)).reduce((a,x)=>a+base(x),0);
}
function kpis(){
  const ing=sumaMov('Ingreso','Ejecutado'), egr=sumaMov('Egreso','Ejecutado');
  const dt=deudaTarjetas(), sp=saldoPrestamos(), liq=totalLiquido();
  const invVal=DB.inversiones.reduce((a,x)=>a+(+x.valorActual||0),0);
  return {
    ing,egr, tasaAhorro: ing?(ing-egr)/ing:0,
    deudaTarjetas:dt, saldoPrestamos:sp, liquido:liq,
    patrimonio: liq-dt-sp,
    ratio: (liq+invVal)?(dt+sp)/(liq+invVal):0,
  };
}
function egresoMensualProm(){
  const meses=new Set(DB.movimientos.filter(x=>x.tipo==='Egreso'&&ejec(x)).map(x=>mesKey(x.fecha)));
  const egr=sumaMov('Egreso','Ejecutado');
  return meses.size?egr/meses.size:0;
}

function runSim(){
  const monto=+($('simMonto')?.value||0);
  const cta=$('simCta')?.value;
  if(!cta) return;
  const saldo=saldoCartera(cta);
  const result=saldo-monto;
  const meta=egresoMensualProm()*DB.fondoMesesMeta;
  const critico=meta*0.5;
  // compromisos programados que salen de esta cuenta
  const prog=DB.movimientos.filter(x=>x.ctaOrigen===cta&&x.tipo==='Egreso'&&x.estado==='Programado').reduce((a,x)=>a+base(x),0);
  let cls,msg;
  if(result<0){cls='bad';msg=`⛔ RECHAZADO · La compra deja <b>${esc(cta)}</b> en saldo negativo (${fmt(result)}).`;}
  else if(result<critico){cls='warn';msg=`⚠ PRECAUCIÓN · Quedarías con ${fmt(result)}, por debajo de tu fondo crítico (${fmt(critico)}).`;}
  else if((result-prog)<critico){cls='warn';msg=`⚠ REVISAR · Con tus egresos programados (${fmt(prog)}) quedarías bajo el fondo crítico.`;}
  else{cls='ok';msg=`✅ APROBADO · Saldo tras la compra: ${fmt(result)}. Tu liquidez y fondo quedan protegidos.`;}
  $('simOut').innerHTML=`<div class="sim-out ${cls}">${msg}</div>`;
}

function diasParaCierre(cierre){
  const hoy=new Date().getDate(); const finMes=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();

}

  const totGan=DB.inversiones.reduce((a,x)=>a+((+x.valorActual||0)+(+x.rendimiento||0)-(+x.invertido||0)),0);

    <tbody>${DB.inversiones.map(x=>{const gan=(+x.valorActual||0)+(+x.rendimiento||0)-(+x.invertido||0);const roi=x.invertido?gan/x.invertido:0;return `<tr>

      <td class="num">${fmt(x.rendimiento)}</td><td class="num ${gan<0?'neg':'pos'}">${fmt(gan)}</td>
      <td class="num"><span class="pill ${roi<0?'r':'g'}">${pct(roi)}</span></td>
      <td><div class="row-actions"><button class="icon-btn" onclick="openInv('${x.id}')">✎</button><button class="icon-btn" onclick="delItem('inversiones','${x.id}')">✕</button></div></td>
    </tr>`;}).join('')}
    <tr class="tot" style="background:var(--slate)"><td style="color:#fff;font-weight:700">TOTALES</td><td class="num" style="color:#fff;font-weight:700">${fmt(totInv)}</td><td class="num" style="color:#fff;font-weight:700">${fmt(totVal)}</td><td></td><td class="num" style="color:#fff;font-weight:700">${fmt(totGan)}</td><td class="num" style="color:#fff;font-weight:700">${pct(roiTot)}</td><td></td></tr>
    </tbody></table>
  </div>
  <div class="card card-pad">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h3 style="margin:0">Provisiones · fracciona gastos anuales</h3>

    <tbody>${DB.provisiones.map(p=>{const men=(+p.anual||0)/12;return `<tr>
      <td><b>${esc(p.concepto)}</b></td><td class="num">${fmt(p.anual)}</td><td class="num">${fmt(men)}</td>
      <td class="num">${p.meses}</td><td class="num pos">${fmt(men*p.meses)}</td>
      <td><div class="row-actions"><button class="icon-btn" onclick="openProv('${p.id}')">✎</button><button class="icon-btn" onclick="delItem('provisiones','${p.id}')">✕</button></div></td>

function saveItem(coll,id,data){ if(id){Object.assign(DB[coll].find(x=>x.id===id),data);}else{DB[coll].push({id:uid(),...data});} render(); toast('Guardado'); }
function delItem(coll,id){ if(confirm('¿Eliminar este registro?')){ DB[coll]=DB[coll].filter(x=>x.id!==id); render(); toast('Eliminado'); } }

/* ============================ UI HELPERS ============================ */
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function go(v){currentView=v;window.scrollTo(0,0);render();document.getElementById('side').classList.remove('open');}
document.getElementById('nav').addEventListener('click',e=>{const a=e.target.closest('a');if(a){go(a.dataset.view);}});

let modalOnSave=null;
function modal(title,body,onSave){
  modalOnSave=onSave;
  $('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal"><div class="modal-head"><h3>${title}</h3><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="confirmModal()">Guardar</button></div></div></div>`;
}
function closeModal(){ $('modalRoot').innerHTML=''; modalOnSave=null; }
function confirmModal(){ if(modalOnSave){ const ok=modalOnSave(); if(ok!==false) closeModal(); } else closeModal(); }

let toastT;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

function exportCSV(){
  const head=['Fecha','Mes','Descripcion','Tipo','Categoria','CuentaOrigen','CuentaDestino','Medio','Moneda','Monto','MontoBaseSoles','Estado'];
  const rows=DB.movimientos.slice().sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(m=>[
    m.fecha,mesKey(m.fecha),m.desc,m.tipo,m.categoria,m.ctaOrigen,m.ctaDestino,m.medio,m.moneda,m.monto,base(m).toFixed(2),m.estado
  ].map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(','));
  const csv=[head.join(','),...rows].join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='movimientos_acif.csv'; a.click();
  toast('CSV exportado');
}
